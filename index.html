            container.innerHTML = html;
            container.scrollTop = container.scrollHeight; 
        }

        // --- ÚJ, PROFI TIMELINE RENDERER FANTOM ESŐ SZŰRÉSSEL ---
        function renderLiveRainLog(allStationPoints) {
            const logBox = document.getElementById('live-rain-log-content');
            const totalBox = document.getElementById('live-rain-log-total');
            if (!logBox || !totalBox) return;

            let events =[];
            let currentEvent = null;
            
            // Phantom eső megelőzése: nem nulláról indul, hanem a kezdeti adatbázis pontból
            let prevTotal = allStationPoints.length > 0 ? (allStationPoints[0].precipTotal || 0) : 0;
            let offset = 0; 

            for (let i = 0; i < allStationPoints.length; i++) {
                let p = allStationPoints[i];
                let rawTotal = p.precipTotal || 0;
                
                let oldOffset = offset;
                if (rawTotal < prevTotal - 0.5) {
                    offset += prevTotal;
                }
                let continuousTotal = rawTotal + offset;
                
                let inc = (i === 0) ? 0 : continuousTotal - (prevTotal + oldOffset);
                if (inc < 0.1) inc = 0; 
                
                prevTotal = rawTotal;
                
                let rate = p.precipRate || 0;
                let isRainingNow = rate >= 0.1 || inc > 0;
                
                if (isRainingNow) {
                    if (!currentEvent) {
                        let fudgeMs = 300000; 
                        if (rate > 5) fudgeMs = 60000; 
                        else if (rate > 2) fudgeMs = 180000; 
                        else if (rate > 0.5) fudgeMs = 300000; 
                        else fudgeMs = 480000; 

                        let st = p.timestamp - fudgeMs;
                        if (events.length > 0 && st <= events[events.length-1].end) {
                            st = events[events.length-1].end + 60000;
                        }

                        currentEvent = { 
                            start: st, 
                            end: null, 
                            startTotal: continuousTotal - inc, 
                            changes:[], 
                            lastDesc: null, 
                            isSnow: (p.temp !== undefined && p.temp !== null ? p.temp : 10) < 2,
                            lastTime: p.timestamp
                        };
                    }
                    
                    let desc = rate > 0 ? getPrecipIntensityDescription(rate, currentEvent.isSnow) : (currentEvent.isSnow ? 'Hószállingózás' : 'Csepergés');
                    let accRain = continuousTotal - currentEvent.startTotal;
                    
                    currentEvent.changes.push({ time: p.timestamp, desc: desc, val: accRain });
                    currentEvent.lastDesc = desc;
                    currentEvent.lastTime = p.timestamp;
                    currentEvent.totalRain = accRain;
                } else {
                    if (currentEvent) {
                        currentEvent.end = currentEvent.lastTime;
                        events.push(currentEvent);
                        currentEvent = null;
                    }
                }
            }

            if (currentEvent) {
                events.push(currentEvent);
            }

            let todayStart = new Date();
            todayStart.setHours(0,0,0,0);
            let todayStartMs = todayStart.getTime();

            let displayEvents = events.filter(ev => {
                return ev.end >= todayStartMs || ev.end === null;
            });

            const station = STATIONS[activeDisplayStationKey];
            let displayDailyTotal = station && station.isOnline && station.data ? 
                station.data.metric.precipTotal : 
                (allStationPoints.length > 0 ? allStationPoints[allStationPoints.length-1].precipTotal : 0);

            if (displayEvents.length > 0) {
                handleRightColumnDisplay(true);
            } else {
                handleRightColumnDisplay(false);
                return; 
            }

            // Timeline felépítése
            let html = '<div class="rain-timeline">';
            
            displayEvents.forEach(ev => {
                let startTimeStr = formatEventTime(ev.start);
                let endTimeStr = ev.end ? formatEventTime(ev.end) : "Folyamatban";
                
                let detailsHtml = '';
                let lastDay = new Date(ev.changes[0]?.time || ev.start).getDate();
                
                ev.changes.forEach(ch => {
                    let chDay = new Date(ch.time).getDate();
                    if (chDay !== lastDay) {
                        detailsHtml += `<div class="rain-day-divider">Éjfél</div>`;
                        lastDay = chDay;
                    }
                    detailsHtml += `
                        <div class="rain-detail-row">
                            <span class="rain-detail-time">${formatHourOnly(ch.time)}</span>
                            <span class="rain-detail-desc">${ch.desc}</span>
                            <span class="rain-detail-val">${Number(ch.val).toFixed(1)} mm</span>
                        </div>
                    `;
                });

                let isExpanded = ev.end === null ? 'expanded' : '';
                let stateClass = ev.end === null ? 'ongoing' : 'completed';
                let timeDisplay = ev.end === null ? `${startTimeStr} óta` : `${startTimeStr} - ${endTimeStr}`;
                let iconClass = ev.end === null ? 'fa-cloud-showers-heavy' : 'fa-check-circle';
                
                html += `
                    <div class="rain-timeline-item ${stateClass} ${isExpanded}">
                        <div class="rain-timeline-marker"></div>
                        <div class="rain-timeline-header" onclick="this.parentElement.classList.toggle('expanded')">
                            <div class="rain-timeline-time"><i class="fas ${iconClass}"></i> ${timeDisplay}</div>
                            <div style="display:flex; align-items:center; gap:8px;">
                                <div class="rain-timeline-amount">${Number(ev.totalRain).toFixed(1)} mm</div>
                                <i class="fas fa-chevron-down rain-timeline-icon"></i>
                            </div>
                        </div>
                        <div class="rain-timeline-details">
                            <div class="scrollable-details" style="max-height: 120px; overflow-y: auto; padding-right: 4px;">
                                ${detailsHtml}
                            </div>
                        </div>
                    </div>
                `;
            });
            html += '</div>';

            logBox.innerHTML = html;
            totalBox.textContent = (displayDailyTotal || 0).toFixed(1) + ' mm';
            
            // Automatikus leugrás a legújabb (legalsó) elemhez a fő konténerben
            logBox.scrollTop = logBox.scrollHeight;
            
            // Automatikus leugrás az aktív (lenyitott) beágyazott görgetőknél is
            const innerScrolls = logBox.querySelectorAll('.rain-timeline-item.expanded .scrollable-details');
            if (innerScrolls.length > 0) {
                const lastInner = innerScrolls[innerScrolls.length - 1];
                lastInner.scrollTop = lastInner.scrollHeight;
            }
        }

        function calculateActualDailyStats(dataPoints) {
            if(!dataPoints || dataPoints.length === 0) return;
            
            const todayStr = new Date().toLocaleDateString("hu-HU");
            const todaysPoints = dataPoints.filter(p => {
                return new Date(p.timestamp).toLocaleDateString("hu-HU") === todayStr;
            });

            if (todaysPoints.length === 0) {
                updateTextValue('actual-max', '--'); updateTextValue('actual-max-time', '');
                updateTextValue('actual-min', '--'); updateTextValue('actual-min-time', '');
                updateTextValue('actual-range', '--');
                return;
            }

            let maxT = null, minT = null;

            todaysPoints.forEach(p => {
                if (p.temp !== null && p.temp !== undefined) {
                    if (maxT === null || p.temp > maxT.temp) maxT = p;
                    if (minT === null || p.temp < minT.temp) minT = p;
                }
            });

            if (maxT !== null) {
                updateTextValue('actual-max', formatValue(maxT.temp, '°', 1));
                updateTextValue('actual-max-time', `(${formatHourOnly(maxT.timestamp)})`);
            }
            if (minT !== null) {
                updateTextValue('actual-min', formatValue(minT.temp, '°', 1));
                updateTextValue('actual-min-time', `(${formatHourOnly(minT.timestamp)})`);
            }
            
            if (maxT !== null && minT !== null) {
                let range = maxT.temp - minT.temp;
                updateTextValue('actual-range', formatValue(range, '°C', 1));
            } else {
                updateTextValue('actual-range', '--');
            }
        }

        function resetToToday() {
            const datePicker = document.getElementById('history-date-picker');
            if (datePicker) {
                const tzOffset = (new Date()).getTimezoneOffset() * 60000;
                const localISOTime = (new Date(Date.now() - tzOffset)).toISOString().slice(0, -1);
                datePicker.value = localISOTime.split('T')[0];
                searchHistory();
            }
        }

        async function searchHistory() {
            const dateVal = document.getElementById('history-date-picker').value;
            if(!dateVal) return;
            
            const picker = document.getElementById('history-station-picker');
            let targetKey = picker ? picker.value : activeDisplayStationKey;
            if(!targetKey || !STATIONS[targetKey]) targetKey = activeDisplayStationKey;
            
            const targetId = STATIONS[targetKey].id;
            const isOnline = STATIONS[targetKey].isOnline;
            
            const dateParts = dateVal.split('-');
            const selectedDateObj = new Date(dateParts[0], parseInt(dateParts[1]) - 1, dateParts[2], 0, 0, 0);
            const selectedDateString = selectedDateObj.toLocaleDateString("hu-HU");
            const todayString = new Date().toLocaleDateString("hu-HU");

            const body = document.getElementById('history-table-body');
            const tableTimeEl = document.getElementById('table-update-time');
            if (tableTimeEl) tableTimeEl.textContent = `Frissítve: ${formatTime(new Date())}`;

            try {
                let allStationPoints =[];

                if (selectedDateString === todayString && windowGlobalHistoryCache && windowGlobalHistoryCache.length > 0) {
                    allStationPoints = getEnrichedHistory(targetKey);
                } else {
                    let dayStartMs = selectedDateObj.getTime();
                    let dayEndMs = dayStartMs + 86400000 - 1; 
                    let fetchStartMs = dayStartMs - (4 * 60 * 60 * 1000); 

                    const snap = await firebase.database().ref('history')
                        .orderByChild('timestamp')
                        .startAt(fetchStartMs)
                        .endAt(dayEndMs)
                        .once('value'); 
                        
                    const data = snap.val(); 
                    if(!data) {
                        body.innerHTML = '<tr><td colspan="7" style="text-align:center; padding: 20px;">Nincs elérhető adat az adatbázisban.</td></tr>';
                        return;
                    }
                    let tempPoints =[];
                    snap.forEach(child => { tempPoints.push(child.val()); });
                    
                    allStationPoints = tempPoints.filter(p => p.stationId === targetId || p.stationId === targetKey || p.stationInternalId === targetId);
                    allStationPoints.sort((a,b) => a.timestamp - b.timestamp);
                }
                
                let descendingPoints =[...allStationPoints].sort((a,b) => b.timestamp - a.timestamp);
                const lastPt = descendingPoints[0];

                const warningBox = document.getElementById('table-offline-warning');
                if (warningBox) {
                    if (!isOnline) {
                        if (lastPt) {
                            warningBox.innerHTML = `<i class="fas fa-exclamation-triangle"></i> <strong>A kiválasztott állomás épp offline!</strong> Jelenleg nem érkezik friss adat. Az utolsó ismert sikeres mérés ekkor történt: <strong>${formatLastSeen(lastPt.timestamp)}</strong>. Az alábbi napló csak az eddig mentett értékeket mutatja.`;
                        } else {
                            warningBox.innerHTML = `<i class="fas fa-exclamation-triangle"></i> <strong>A kiválasztott állomás épp offline!</strong> Jelenleg nem érkezik friss adat, és egyelőre nincs korábbi mérés sem a memóriában.`;
                        }
                        warningBox.classList.remove('is-hidden');
                    } else {
                        warningBox.classList.add('is-hidden');
                    }
                }

                const dailyPoints = descendingPoints.filter(p => {
                    const pDateString = new Date(p.timestamp).toLocaleDateString("hu-HU");
                    return (pDateString === selectedDateString) || (p.datum && p.datum.includes(selectedDateString));
                });

                let dayStartMs = selectedDateObj.getTime();
                let pointsBeforeDay = allStationPoints.filter(p => p.timestamp < dayStartMs).sort((a,b) => a.timestamp - b.timestamp);
                let prevRaw = pointsBeforeDay.length > 0 ? (pointsBeforeDay[pointsBeforeDay.length - 1].precipTotal || 0) : 0;
                
                let preciseDailyAcc = 0;
                let wasRainingForward = false;
                
                let chronologicalDaily =[...dailyPoints].sort((a,b) => a.timestamp - b.timestamp);
                
                chronologicalDaily.forEach(p => {
                    let raw = p.precipTotal || 0;
                    let diff = raw - prevRaw;
                    
                    if (diff > 0) {
                        preciseDailyAcc += diff;
                    } else if (diff < 0) {
                        preciseDailyAcc += raw;
                    }
                    
                    p.displayPrecip = preciseDailyAcc;
                    
                    let rate = p.precipRate || 0;
                    let isRainingForward = (rate >= 0.1 || diff >= 0.1);
                    
                    if (isRainingForward) {
                        p.rainState = 'raining';
                        wasRainingForward = true;
                    } else if (wasRainingForward) {
                        p.rainState = 'stopped';
                        wasRainingForward = false;
                    } else {
                        p.rainState = 'none';
                    }

                    prevRaw = raw;
                });

                const midDay = new Date(selectedDateObj.getTime());
                midDay.setHours(12,0,0,0);
                const sunTimesForDate = SunCalc.getTimes(midDay, STATIONS[targetKey].coords.lat, STATIONS[targetKey].coords.lon);
                const srTime = sunTimesForDate.sunrise.getTime();
                const ssTime = sunTimesForDate.sunset.getTime();

                let html = '';
                let sunriseInjected = false;
                let sunsetInjected = false;

                if (dailyPoints.length > 0) {
                    for (let i = 0; i < dailyPoints.length; i++) {
                        const p = dailyPoints[i];
                        const nextP = dailyPoints[i+1]; 
                        
                        const timeStr = new Date(p.timestamp).toLocaleTimeString('hu-HU', {hour: '2-digit', minute:'2-digit'});
                        
                        let precipValToShow = p.displayPrecip !== undefined ? p.displayPrecip : (p.precipTotal || 0);
                        let precipHtml = `<span style="${precipValToShow >= 0.1 ? 'color: var(--precip-color); font-weight: bold;' : ''}">${precipValToShow.toFixed(1)} mm</span>`;
                        
                        if (p.rainState === 'raining') {
                            let isSnow = p.temp !== null && p.temp < 2;
                            let desc = p.precipRate > 0 ? getPrecipIntensityDescription(p.precipRate, isSnow) : (isSnow ? 'Hószállingózás' : 'Csepergés / Szitálás');
                            precipHtml += `<br><span style="font-size: 10px; color: var(--text-secondary); opacity: 0.9;">${desc}</span>`;
                        } else if (p.rainState === 'stopped') {
                            precipHtml += `<br><span style="font-size: 10px; color: #4ade80; font-weight: bold; opacity: 0.9;">Csapadék elállt</span>`;
                        }

                        html += `
                        <tr style="border-bottom: 1px solid rgba(255,255,255,0.05); transition: background 0.2s;">
                            <td style="padding: 10px 4px; white-space: nowrap;">${timeStr}</td>
                            <td style="padding: 10px 4px; font-weight:bold; color: #ffdd00; white-space: nowrap;">${p.temp != null ? Number(p.temp).toFixed(1) + ' °C' : '--'}</td>
                            <td style="padding: 10px 4px; white-space: nowrap;">${p.humidity != null ? Math.round(p.humidity) + ' %' : '--'}</td>
                            <td style="padding: 10px 4px; color: #38bdf8; white-space: nowrap;">${p.windSpeed != null ? Number(p.windSpeed).toFixed(1) : '0.0'} km/h</td>
                            <td style="padding: 10px 4px; white-space: nowrap;">${p.pressure != null ? Number(p.pressure).toFixed(1) + ' hPa' : '--'}</td>
                            <td style="padding: 10px 4px; white-space: nowrap;">${p.uv != null ? Number(p.uv).toFixed(1) : '--'}</td>
                            <td style="padding: 10px 4px;">${precipHtml}</td>
                        </tr>`;

                        if (nextP) {
                            if (!sunsetInjected && p.timestamp >= ssTime && nextP.timestamp < ssTime) {
                                html += `<tr class="sun-event-row row-sunset"><td colspan="7"><i class="fas fa-sunset"></i> Napnyugta (${formatHourOnly(sunTimesForDate.sunset)})</td></tr>`;
                                sunsetInjected = true;
                            }
                            if (!sunriseInjected && p.timestamp >= srTime && nextP.timestamp < srTime) {
                                html += `<tr class="sun-event-row row-sunrise"><td colspan="7"><i class="fas fa-sunrise"></i> Napkelte (${formatHourOnly(sunTimesForDate.sunrise)})</td></tr>`;
                                sunriseInjected = true;
                            }
                        }
                    }
                } else {
                    if (!isOnline && lastPt) {
                        html = `<tr><td colspan="7" style="text-align:center; padding: 20px; color: #fca5a5; background: rgba(239, 68, 68, 0.05);">Ezen a napon nem érkezett adat. Jelenleg a(z) ${STATIONS[targetKey].displayNameShort || STATIONS[targetKey].displayName} állomás <strong>OFFLINE</strong>.<br>Az utolsó ismert sikeres mérés (${formatLastSeen(lastPt.timestamp)}) adatai:</td></tr>`;
                        
                        const timeStr = new Date(lastPt.timestamp).toLocaleTimeString('hu-HU', {hour: '2-digit', minute:'2-digit'});
                        let precipValToShow = lastPt.displayPrecip !== undefined ? lastPt.displayPrecip : (lastPt.precipTotal || 0);
                        let precipHtml = `<span style="${precipValToShow >= 0.1 ? 'color: var(--precip-color); font-weight: bold;' : ''}">${precipValToShow.toFixed(1)} mm</span>`;
                        
                        if (lastPt.rainState === 'raining') {
                            let isSnow = lastPt.temp !== null && lastPt.temp < 2;
                            let desc = lastPt.precipRate > 0 ? getPrecipIntensityDescription(lastPt.precipRate, isSnow) : (isSnow ? 'Hószállingózás' : 'Csepergés / Szitálás');
                            precipHtml += `<br><span style="font-size: 10px; color: var(--text-secondary); opacity: 0.9;">${desc}</span>`;
                        } else if (lastPt.rainState === 'stopped') {
                            precipHtml += `<br><span style="font-size: 10px; color: #4ade80; font-weight: bold; opacity: 0.9;">Csapadék elállt</span>`;
                        }

                        html += `
                        <tr style="border-bottom: 1px solid rgba(255,255,255,0.05); background: rgba(239, 68, 68, 0.15);">
                            <td style="padding: 10px 4px; white-space: nowrap;">${timeStr}</td>
                            <td style="padding: 10px 4px; font-weight:bold; color: #ffdd00; white-space: nowrap;">${lastPt.temp != null ? Number(lastPt.temp).toFixed(1) + ' °C' : '--'}</td>
                            <td style="padding: 10px 4px; white-space: nowrap;">${lastPt.humidity != null ? Math.round(lastPt.humidity) + ' %' : '--'}</td>
                            <td style="padding: 10px 4px; color: #38bdf8; white-space: nowrap;">${lastPt.windSpeed != null ? Number(lastPt.windSpeed).toFixed(1) : '0.0'} km/h</td>
                            <td style="padding: 10px 4px; white-space: nowrap;">${lastPt.pressure != null ? Number(lastPt.pressure).toFixed(1) + ' hPa' : '--'}</td>
                            <td style="padding: 10px 4px; white-space: nowrap;">${lastPt.uv != null ? Number(lastPt.uv).toFixed(1) : '--'}</td>
                            <td style="padding: 10px 4px;">${precipHtml}</td>
                        </tr>`;
                    } else {
                        html = `<tr><td colspan="7" style="text-align:center; padding: 20px;">Ezen a napon nem találtam adatot a(z) ${STATIONS[targetKey].displayNameShort || STATIONS[targetKey].displayName} állomáson.</td></tr>`;
                    }
                }

                body.innerHTML = html;
            } catch (error) {
                console.error("Hiba a keresés közben:", error);
                body.innerHTML = '<tr><td colspan="7" style="text-align:center; padding: 20px; color: #ef4444;">Hiba történt a lekérdezés közben.</td></tr>';
            }
        }

        function updateTheme() {
            if (!cachedData.sunCalc) return;
            const now = new Date();
            const lat = STATIONS[activeDisplayStationKey].coords.lat;
            const lon = STATIONS[activeDisplayStationKey].coords.lon;
            const times = SunCalc.getTimes(now, lat, lon);
            
            let phase = "";
            if (now >= times.night) phase = "night"; 
            else if (now >= times.nauticalDusk) phase = "dusk"; 
            else if (now >= times.sunset) phase = "sunsetEnd"; 
            else if (now >= times.sunsetStart) phase = "sunset"; 
            else if (now >= times.goldenHour) phase = "goldenHour"; 
            else if (now >= times.solarNoon) phase = "afternoon"; 
            else if (now >= times.goldenHourEnd) phase = "morning"; 
            else if (now >= times.sunriseEnd) phase = "earlyMorning"; 
            else if (now >= times.sunrise) phase = "sunrise"; 
            else if (now >= times.nauticalDawn) phase = "dawn"; 
            else phase = "night"; 

            const root = document.documentElement;
            const themes = {
                night: { bg: "linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%)", glass: "rgba(15,23,42,0.45)", border: "rgba(255,255,255,0.1)", shadow: "0 8px 32px 0 rgba(0,0,0,0.5)", accent: "#38bdf8" },
                dawn: { bg: "linear-gradient(135deg, #1a2a6c 0%, #b21f1f 100%)", glass: "rgba(20,20,40,0.5)", border: "rgba(255,255,255,0.15)", shadow: "0 8px 32px 0 rgba(0,0,20,0.4)", accent: "#f87171" },
                sunrise: { bg: "linear-gradient(135deg, #ff4e50 0%, #f9d423 100%)", glass: "rgba(40,20,20,0.3)", border: "rgba(255,255,255,0.2)", shadow: "0 8px 32px 0 rgba(50,10,10,0.3)", accent: "#ffdd00" },
                earlyMorning: { bg: "linear-gradient(135deg, #3a7bd5 0%, #3a6073 100%)", glass: "rgba(255,255,255,0.1)", border: "rgba(255,255,255,0.2)", shadow: "0 8px 32px 0 rgba(0,20,50,0.2)", accent: "#fbbf24" },
                morning: { bg: "linear-gradient(135deg, #2193b0 0%, #6dd5ed 100%)", glass: "rgba(255,255,255,0.15)", border: "rgba(255,255,255,0.25)", shadow: "0 8px 32px 0 rgba(0,30,60,0.2)", accent: "#ffdd00" },
                afternoon: { bg: "linear-gradient(135deg, #00B4DB 0%, #0083B0 100%)", glass: "rgba(255,255,255,0.15)", border: "rgba(255,255,255,0.3)", shadow: "0 8px 32px 0 rgba(0,10,40,0.2)", accent: "#ffdd00" },
                goldenHour: { bg: "linear-gradient(135deg, #f12711 0%, #f5af19 100%)", glass: "rgba(50,20,0,0.2)", border: "rgba(255,255,255,0.25)", shadow: "0 8px 32px 0 rgba(50,20,0,0.3)", accent: "#fff" },
                sunset: { bg: "linear-gradient(135deg, #c31432 0%, #240b36 100%)", glass: "rgba(30,10,30,0.4)", border: "rgba(255,255,255,0.15)", shadow: "0 8px 32px 0 rgba(0,0,0,0.4)", accent: "#fca5a5" },
                sunsetEnd: { bg: "linear-gradient(135deg, #4b1248 0%, #f0c27b 100%)", glass: "rgba(20,10,30,0.4)", border: "rgba(255,255,255,0.1)", shadow: "0 8px 32px 0 rgba(0,0,0,0.5)", accent: "#fca5a5" },
                dusk: { bg: "linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%)", glass: "rgba(15,23,42,0.45)", border: "rgba(255,255,255,0.1)", shadow: "0 8px 32px 0 rgba(0,0,0,0.5)", accent: "#38bdf8" }
            };

            const t = themes[phase];
            if (t) {
                root.style.setProperty('--current-bg-body', t.bg);
                root.style.setProperty('--current-glass-bg', t.glass);
                root.style.setProperty('--current-glass-border', t.border);
                root.style.setProperty('--current-glass-shadow', t.shadow);
                root.style.setProperty('--current-accent', t.accent);
            }
        }

        function updateMainDisplayData() {
            const station = STATIONS[activeDisplayStationKey]; 
            if (station && station.isOnline) { 
                cachedData.displayPws = { ...station.data.metric, ...station.data }; 
            } else { 
                const gen = cachedData.generalConditions; 
                if (gen && Object.keys(gen).length > 0) { 
                    cachedData.displayPws = { temp: gen.temperature, windSpeed: gen.windSpeed, winddir: gen.windDirection, dewpt: gen.dewpoint, humidity: gen.relativeHumidity, pressure: gen.pressureAltimeter, uv: gen.uvIndex }; 
                } else { cachedData.displayPws = {}; } 
            } 
            
            updateTheme();
            Object.keys(STATIONS).forEach(key => updateStationStatusUI(key)); 
            compileAndRenderDisplayData(); 
        }

        function drawCompassRose() {
            const compassRoseSvg = document.querySelector('.wind-compass-rose');
            if(!compassRoseSvg) return;
            const center = 50; const radius = 42;
            const directions = { 'É': 0, 'K': 90, 'D': 180, 'NY': 270 };
            for (let i = 0; i < 360; i += 15) {
                const isMajor = i % 45 === 0;
                const r1 = isMajor ? radius - 4 : radius - 2;
                const angle = (i - 90) * Math.PI / 180;
                const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
                line.setAttribute('x1', center + r1 * Math.cos(angle)); line.setAttribute('y1', center + r1 * Math.sin(angle));
                line.setAttribute('x2', center + radius * Math.cos(angle)); line.setAttribute('y2', center + radius * Math.sin(angle));
                line.setAttribute('class', `tick`);
                line.setAttribute('stroke-width', isMajor ? 1.5 : 1);
                compassRoseSvg.appendChild(line);
            }
            for (const dir in directions) {
                const angle = (directions[dir] - 90) * Math.PI / 180;
                const text = document.createElementNS("http://www.w3.org/2000/svg", "text");
                text.setAttribute('x', center + (radius - 12) * Math.cos(angle));
                text.setAttribute('y', center + (radius - 12) * Math.sin(angle) + 4);
                text.textContent = dir;
                compassRoseSvg.appendChild(text);
            }
        }

        function updateStationStatusUI(stationKey) { 
            const st = STATIONS[stationKey]; if (!st) return; 
            const dot = document.getElementById(`status-indicator-${stationKey}`); 
            if(dot) { dot.className = `status-dot ${st.isOnline ? 'online' : 'offline'}`; } 
            const container = document.getElementById(`${stationKey.toLowerCase()}-selector-container`); 
            if(container) { container.classList.toggle('disabled', !st.isOnline); } 
            const radio = document.getElementById(`station-select-${stationKey.toLowerCase()}`); 
            if(radio) { radio.checked = (stationKey === activeDisplayStationKey); } 
        }
        
        async function handleStationChange(event) { 
            const key = event.target.value; 
            if (STATIONS[key].isOnline && key !== activeDisplayStationKey) { 
                activeDisplayStationKey = key; 
                forecastPage = 0;
                precipChancePage = 0;
                const st = STATIONS[activeDisplayStationKey]; 
                if (st && st.data) { cachedData.displayPws = { ...st.data.metric, ...st.data, isLocalShower: st.data.isLocalShower }; }
                
                try {
                    const newGen = await fetchGeneralConditionsData(st.coords.lat, st.coords.lon);
                    if (newGen) cachedData.generalConditions = newGen;
                    await fetchMetarData();
                    const newSun = await fetchAdvancedSunCalcData(st.coords.lat, st.coords.lon);
                    if (newSun) cachedData.sunCalc = newSun;
                } catch (e) {}

                await fetchAndDisplayForecastsForStation(key);
                compileAndRenderDisplayData(); 
                
                const hp = document.getElementById('history-station-picker');
                if (hp) {
                    hp.value = activeDisplayStationKey;
                    processChartStationHistory();
                    searchHistory();
                }
                processMainStationHistory();
                
            } else if (!STATIONS[key].isOnline) { 
                event.target.checked = false; 
                const prev = document.querySelector(`input[value="${activeDisplayStationKey}"]`); 
                if (prev) prev.checked = true; 
            } 
        }

        function addStationChangeListeners() { document.querySelectorAll('input[name="station-select"]').forEach(r => r.addEventListener('change', handleStationChange)); }
        function addPaginationListeners() {
            const pag = document.getElementById('forecast-pagination');
            if(pag) pag.addEventListener('click', (e) => {
                if (e.target.classList.contains('pagination-btn')) {
                    const newPage = parseInt(e.target.dataset.page, 10);

            });

                if (e.target.classList.contains('pagination-btn')) {
                    const newPage = parseInt(e.target.dataset.page, 10);
                    if (newPage !== precipChancePage) { precipChancePage = newPage; render8HourPrecipChance(); }
                }
            });
        }

        function compileAndRenderDisplayData() { 
            if (!cachedData.displayPws || Object.keys(cachedData.displayPws).length === 0) return; 
            renderWeatherData(); 
            renderPrecipitationSummary(); 
            renderHourlyForecastData(); 
            render8HourPrecipChance();

        function updateTextValue(id, value) { const el = document.getElementById(id); if(el) el.textContent = value; }

        function renderCAPEAlert() {
            const capeAlertBar = document.getElementById('cape-alert-bar');
            if(!capeAlertBar) return;
            
            const capeData = forecastCache[activeDisplayStationKey]?.cape;
            if(!capeData || !capeData.time || !capeData.cape) {
                capeAlertBar.style.display = 'none';
                return;
            }
            
            const now = new Date().getTime();
            const eightHoursLater = now + 8 * 3600 * 1000;
            let maxCape = 0;
            
            for(let i=0; i<capeData.time.length; i++) {
                const ct = new Date(capeData.time[i]).getTime();
                if(ct >= now && ct <= eightHoursLater) {
                    if(capeData.cape[i] > maxCape) maxCape = capeData.cape[i];
                }
            }
            
            if(maxCape >= 400) {
                capeAlertBar.style.display = 'block';
                let desc, color, icon;
                if(maxCape >= 1500) { 
                    desc = "Extrém zivatarveszély"; 
                    color = "linear-gradient(90deg, #b91c1c, #ef4444)"; 
                    icon = "fa-bolt"; 
                } else if(maxCape >= 800) { 
                    desc = "Erős zivatarveszély"; 
                    color = "linear-gradient(90deg, #c2410c, #f97316)"; 
                    icon = "fa-bolt"; 
                } else { 
                    desc = "Zivatarhajlam (Mérsékelt)"; 
                    color = "linear-gradient(90deg, #a16207, #eab308)"; 
                    icon = "fa-cloud-bolt"; 
                }
                
                capeAlertBar.innerHTML = `<i class="fas ${icon}" style="margin-right: 6px;"></i> <span>${desc} (Max CAPE: ${Math.round(maxCape)} J/kg)</span>`;
                capeAlertBar.style.background = color;
            } else {
                capeAlertBar.style.display = 'none';
            }
        }

        function renderWeatherData() {
            const obs = cachedData.displayPws; 
            const gen = cachedData.generalConditions; 
            const station = STATIONS[activeDisplayStationKey];
            if (!gen || !obs || !station) return;
            
            const timeNow = formatTime(new Date(), { includeSeconds: true });
            const timeNowShort = formatTime(new Date());

            const statusText = station.isOnline ? '' : ' (Offline)';
            const stName = (station.displayNameShort || station.displayName) + statusText;

            updateTextValue('title-wind', `Széladatok - ${stName}`);
            updateTextValue('title-precip-chance', `Órás Csapadékesély - ${stName}`);

            updateTextValue('location-title-text', station.displayName);
            updateTextValue('main-timestamp', `Frissítve: ${timeNow}`);
            updateTextValue('wind-update-time', `Frissítve: ${timeNowShort}`);
            
            const temp = obs.temp; 
            const windSpeed = obs.windSpeed ?? gen.windSpeed; 
            const feelsLike = gen.temperatureFeelsLike !== undefined && gen.temperatureFeelsLike !== null ? gen.temperatureFeelsLike : temp;

            updateTextValue('current-temp-span', formatValue(temp, '', 1)); 
            updateTextValue('feels-like-temp', formatValue(feelsLike, '°C', 1)); 
            
            const maxT = gen.temperatureMax24Hour;
            const minT = gen.temperatureMin24Hour;
            if(maxT != null && minT != null) {
                updateTextValue('forecast-minmax', `${formatValue(minT, '°', 0)} / ${formatValue(maxT, '°', 0)}`);
            } else {
                updateTextValue('forecast-minmax', '-- / --');
            }
            
            let conditionText = "Ismeretlen";
            let iconClass = "fas fa-cloud";
            let isSnowing = false;
            let isZivatar = false;
            let isMetarEmergency = false;

            let isNyh = station.useLHNY !== false; 
            let metarAgeMins = 999;
            
            if (cachedData.metarCondition && cachedData.metarCondition.obsTime) {
                let obsMs = new Date(cachedData.metarCondition.obsTime).getTime();
                if (obsMs < 100000000000) obsMs *= 1000; 
                metarAgeMins = (Date.now() - obsMs) / 60000;
            }

            let useMetar = isNyh && cachedData.metarCondition && metarAgeMins <= 20;

            const fltBadge = document.getElementById('flight-category-badge');
            if (useMetar && cachedData.metarCondition.fltcat) {
                let cat = cachedData.metarCondition.fltcat.toUpperCase();
                fltBadge.textContent = cat;
                fltBadge.style.display = 'inline-block';
                if (cat === 'VFR') { fltBadge.style.background = '#22c55e'; fltBadge.style.color = '#fff'; }
                else if (cat === 'MVFR') { fltBadge.style.background = '#3b82f6'; fltBadge.style.color = '#fff'; }
                else if (cat === 'IFR') { fltBadge.style.background = '#ef4444'; fltBadge.style.color = '#fff'; }
                else if (cat === 'LIFR') { fltBadge.style.background = '#d946ef'; fltBadge.style.color = '#fff'; }
                else { fltBadge.style.display = 'none'; }
            } else {
                fltBadge.style.display = 'none';
            }

            if (useMetar) {
                const metar = parseMetarToHungarian(cachedData.metarCondition, gen.dayOrNight === 'D');
                if (metar) {
                    conditionText = metar.phrase;
                    iconClass = metar.iconClass;
                    isSnowing = metar.isSnowing;
                    isZivatar = metar.isZivatar;
                    isMetarEmergency = metar.isEmergency;
                }
            } else {
                conditionText = gen.wxPhraseLong || mapIconCodeToHungarianText(gen.iconCode, gen.dayOrNight);
                iconClass = mapTwcIconToFontAwesome(gen.iconCode, gen.dayOrNight);
                isSnowing = SNOW_ICON_CODES.includes(gen.iconCode);
                const baseLower = conditionText.toLowerCase();
                isZivatar = baseLower.includes('zivatar') ||[3, 4, 37, 38, 47].includes(gen.iconCode);
            }

            if (conditionText.toLowerCase() === 'szép' || conditionText.toLowerCase() === 'fair' || conditionText.toLowerCase() === 'tiszta idő') {
                conditionText = "Gyengén felhős";
            }

            const isApiRaining = /eső|zápor|szitálás|zivatar|havaz|permet|felhőszakad|hófúvás|hó|jég|csapadék/i.test(conditionText);
            if (isApiRaining && (!obs.precipRate || obs.precipRate < 0.1) && !isMetarEmergency) {
                conditionText = "Felhős"; 
                iconClass = gen.dayOrNight === 'D' ? "fas fa-cloud-sun" : "fas fa-cloud-moon";
                
                if (useMetar && cachedData.metarCondition.clouds) {
                    const covers = cachedData.metarCondition.clouds.map(c => c.cover);
                    if (covers.includes('OVC')) { conditionText = "Borult"; iconClass = "fas fa-cloud"; }
                    else if (covers.includes('BKN')) { conditionText = "Erősen felhős"; iconClass = "fas fa-cloud"; }
                    else if (covers.includes('SCT')) { conditionText = "Részben felhős"; iconClass = gen.dayOrNight === 'D' ? "fas fa-cloud-sun" : "fas fa-cloud-moon"; }
                    else if (covers.includes('FEW')) { conditionText = "Gyengén felhős"; iconClass = gen.dayOrNight === 'D' ? "fas fa-cloud-sun" : "fas fa-cloud-moon"; }
                    else { conditionText = gen.dayOrNight === 'D' ? "Derült" : "Tiszta ég"; iconClass = gen.dayOrNight === 'D' ? "fas fa-sun" : "fas fa-moon"; }
                } else if (conditionText.toLowerCase().includes('zivatar')) {
                    conditionText = "Erősen felhős";
                    iconClass = "fas fa-cloud";
                }
                isSnowing = false;
                isZivatar = false;
            }

            let isDayTime = true;
            if (cachedData.sunCalc) {
                const nowMs = new Date().getTime();
                isDayTime = (nowMs > cachedData.sunCalc.sunrise.getTime() && nowMs < cachedData.sunCalc.sunset.getTime());
            } else {
                isDayTime = gen.dayOrNight === 'D';
            }

            if (isDayTime && obs.solarRadiation !== undefined && obs.solarRadiation !== null && !isMetarEmergency) {
                let solar = obs.solarRadiation;
                let uv = obs.uv || 0;

                if (conditionText.includes("Borult") || conditionText.includes("Erősen felhős") || conditionText.includes("Zivatar") || conditionText.includes("Köd")) {
                    if (solar > 600 || uv >= 4) {
                        conditionText = "Napos";
                        iconClass = "fas fa-sun";
                        isSnowing = false; isZivatar = false;
                    } else if (solar > 250 || uv >= 2) {
                        conditionText = "Részben felhős";
                        iconClass = "fas fa-cloud-sun";
                        isSnowing = false; isZivatar = false;
                    }
                }
                
                if (conditionText.includes("Részben felhős") || conditionText.includes("Gyengén felhős")) {
                    if (solar > 750 || uv >= 5) {
                        conditionText = "Napos";
                        iconClass = "fas fa-sun";
                    }
                }
            }

            if (obs.precipRate >= 0.1 && !isMetarEmergency) {
                isSnowing = obs.temp !== null && obs.temp < 2; 
                
                if (obs.isLocalShower) {
                    conditionText = isSnowing ? "Lokális hózápor" : "Lokális zápor";
                    iconClass = isSnowing ? "fas fa-snowflake" : (isDayTime ? "fas fa-cloud-sun-rain" : "fas fa-cloud-moon-rain");
                } else {
                    if (isSnowing) {
                        if (obs.precipRate <= 0.5) { conditionText = "Hószállingózás"; iconClass = "fas fa-snowflake"; }
                        else if (obs.precipRate <= 1.5) { conditionText = "Gyenge havazás"; iconClass = "fas fa-snowflake"; }
                        else if (obs.precipRate <= 3.0) { conditionText = "Mérsékelt havazás"; iconClass = "fas fa-snowflake"; }
                        else if (obs.precipRate <= 6.0) { conditionText = "Erős havazás"; iconClass = "fas fa-snowflake"; }
                        else { conditionText = "Intenzív hóvihar"; iconClass = "fas fa-snowflake"; }
                    } else if (isZivatar) {
                        if (obs.precipRate <= 2.0) { conditionText = "Gyenge zivatar"; iconClass = "fas fa-cloud-bolt"; }
                        else if (obs.precipRate <= 10.0) { conditionText = "Mérsékelt zivatar"; iconClass = "fas fa-cloud-bolt"; }
                        else if (obs.precipRate <= 25.0) { conditionText = "Heves zivatar"; iconClass = "fas fa-cloud-showers-heavy"; }
                        else { conditionText = "Károkozó heves zivatar"; iconClass = "fas fa-cloud-showers-heavy"; }
                    } else {
                        if (obs.precipRate <= 0.5) { conditionText = "Csepergés / Szitálás"; iconClass = "fas fa-cloud-rain"; }
                        else if (obs.precipRate <= 2.0) { conditionText = "Gyenge eső"; iconClass = "fas fa-cloud-rain"; }
                        else if (obs.precipRate <= 5.0) { conditionText = "Mérsékelt eső"; iconClass = "fas fa-cloud-rain"; }
                        else if (obs.precipRate <= 10.0) { conditionText = "Erős eső"; iconClass = "fas fa-cloud-showers-heavy"; }
                        else if (obs.precipRate <= 25.0) { conditionText = "Zuhogó eső / Zápor"; iconClass = "fas fa-cloud-showers-heavy"; }
                        else if (obs.precipRate <= 50.0) { conditionText = "Heves zápor / Felhőszakadás"; iconClass = "fas fa-cloud-showers-water"; }
                        else { conditionText = "Extrém felhőszakadás"; iconClass = "fas fa-cloud-showers-water"; }
                    }
                }
            }
            
            const condTextEl = document.getElementById('main-condition-text');
            if(condTextEl) {
                condTextEl.textContent = conditionText;
                if(isMetarEmergency) {
                    condTextEl.style.color = '#ef4444';
                    condTextEl.style.animation = 'pulseCape 1s infinite alternate';
                } else {
                    condTextEl.style.color = '';
                    condTextEl.style.animation = '';
                }
            }
            
            const iconEl = document.getElementById('main-condition-icon');
            if(iconEl && iconEl.className !== iconClass) iconEl.className = iconClass;
            
            const windDir = obs.winddir ?? gen.windDirection; 
            const windArrow = document.getElementById('wind-compass-arrow'); 
            if (windArrow && windDir !== null) { windArrow.style.transform = `rotate(${windDir}deg)`; }
            
            updateTextValue('wind-speed-value-span', formatValue(windSpeed, '', 1));
            updateTextValue('wind-gust-value', formatValue(obs.windGust, ' km/h', 0)); 
            updateTextValue('wind-direction-full', degreesToCompassFull(windDir)); 
            
            const beaufort = getBeaufort(windSpeed);
            document.documentElement.style.setProperty('--current-wind-color', getWindColor(windSpeed));
            updateTextValue('beaufort-desc', beaufort.desc);
            const bars = document.querySelectorAll('#beaufort-scale-container .beaufort-bar');
            bars.forEach((b, idx) => { b.classList.toggle('active', idx < beaufort.num); });

            let tSymbol = ''; 
            if (gen.pressureTendencyCode === 0) tSymbol = '↑'; 
            else if (gen.pressureTendencyCode === 1) tSymbol = '↓'; 
            else tSymbol = '→';

            updateTextValue('compact-value-humidity', formatValue(obs.humidity ?? gen.relativeHumidity, '%', 0)); 
            updateTextValue('compact-value-pressure', `${formatValue(obs.pressure ?? gen.pressureAltimeter, '', 1)} hPa ${tSymbol}`);
            updateTextValue('compact-value-dewpoint', formatValue(obs.dewpt ?? gen.dewpoint, '°C', 1));
            updateTextValue('compact-value-uv', formatValue(obs.uv ?? gen.uvIndex, '', 1));

            if (cachedData.sunCalc) {
                updateTextValue('compact-value-sunrise', formatTime(cachedData.sunCalc.sunrise));
                updateTextValue('compact-value-sunset', formatTime(cachedData.sunCalc.sunset));
            }

            updateTextValue('radar-update-time', `Frissítve: ${formatTime(new Date())}`);

                let html = '';

                    let isSnow = false;
                    if (s.data.metric.temp !== null && s.data.metric.temp !== undefined) {

                    <strong>Hogyan működik?</strong> A rendszer a helyi PWS hálózat valós idejű adatait figyeli. Ha egy állomás esőt észlel, azonnal megjelenik itt.
                </div>`;

        function render8HourPrecipChance() {
            const full = forecastCache[activeDisplayStationKey]?.hourly ||[];
            const container = document.getElementById('precip-chance-grid');
            const summaryEl = document.getElementById('precip-chance-summary-text');
            const pagContainer = document.getElementById('precip-chance-pagination');
            if(!container || !pagContainer) return;

            updateTextValue('precip-chance-update-time', `Frissítve: ${formatTime(new Date())}`);

            const now = new Date();
            const currentHourStart = new Date(now.getFullYear(), now.getMonth(), now.getDate(), now.getHours(), 0, 0).getTime();
            const endOfToday = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 23, 59, 59).getTime();

            let startIdx = full.findIndex(h => new Date(h.time).getTime() >= currentHourStart);
            if (startIdx === -1) startIdx = 0;

            let totalQpfToday = 0;
            full.forEach(h => {
                const hTime = new Date(h.time).getTime();
                if (hTime >= currentHourStart && hTime <= endOfToday) {
                    totalQpfToday += (h.qpf || 0) + (h.qpfSnow || 0);
                }
            });

            if (summaryEl) {
                if (totalQpfToday > 0) {
                    summaryEl.innerHTML = `<i class="fas fa-droplet"></i> Mai napra előrejelzett: ${totalQpfToday.toFixed(1)} mm`;
                    summaryEl.style.display = 'block';
                } else {
                    summaryEl.style.display = 'none';
                }
            }

            let pagHTML = '';
            for(let i = 0; i < 3; i++) {
                const cStart = startIdx + (i * 8);
                if(cStart >= full.length) break;
                const btnTime = formatHourOnly(full[cStart].time);
                pagHTML += `<button class="pagination-btn ${i === precipChancePage ? 'active' : ''}" data-page="${i}">${btnTime}</button>`;
            }
            pagContainer.innerHTML = pagHTML;

            const sliceStart = startIdx + (precipChancePage * 8);
            const next8Hours = full.slice(sliceStart, sliceStart + 8);

            if (next8Hours.length === 0) {
                container.innerHTML = '<div style="font-size: 12px; color: var(--text-secondary);">Nincs elérhető adat.</div>';
                return;
            }

            let html = '';
            const currentDay = new Date().getDate();

            next8Hours.forEach(h => {
                const chance = h.precipChance || 0;
                const isSnow = SNOW_ICON_CODES.includes(h.iconCode);
                const ringColor = isSnow ? '#22d3ee' : '#38bdf8'; 
                const trackColor = 'rgba(0,0,0,0.4)'; 
                
                let qpf = h.qpf || 0;
                let qpfSnow = h.qpfSnow || 0;
                let precipDesc = "";
                let precipAmountStr = "";
                
                if (qpf === 0 && qpfSnow === 0) {
                    if (chance >= 15) {
                        precipDesc = "Csepergés esélye";
                        precipAmountStr = "< 0.1 mm";
                    } else {
                        precipDesc = "Száraz idő";
                        precipAmountStr = "0.0 mm";
                    }
                } else {
                    if (isSnow) {
                        precipAmountStr = formatValue(qpfSnow, ' cm', 1);
                        precipDesc = getPrecipIntensityDescription(qpfSnow, true);
                    } else {
                        precipAmountStr = formatValue(qpf, ' mm', 1);
                        precipDesc = getPrecipIntensityDescription(qpf, false);
                    }
                }

                const hDate = new Date(h.time);
                const hDay = hDate.getDate();
                let displayTime = formatHourOnly(h.time);
                
                if (hDay !== currentDay) {
                    let tomorrow = new Date();
                    tomorrow.setDate(currentDay + 1);
                    if (hDay === tomorrow.getDate()) {
                        displayTime = `<span style="color:var(--current-accent); font-size:10px; margin-right:4px;">Holnap</span>${displayTime}`;
                    } else {
                        displayTime = `<span style="color:var(--text-secondary); font-size:10px; margin-right:4px;">${formatDateWithDay(hDate).split(' ')[1]}</span>${displayTime}`;
                    }
                }

                const textColor = chance >= 15 ? ringColor : 'var(--text-secondary)';

                html += `
                    <div class="precip-chance-item">
                        <div class="precip-circular-wrapper">
                            <div class="precip-circular-ring" style="background: conic-gradient(${ringColor} ${chance}%, ${trackColor} 0);"></div>
                            <div class="precip-circular-value">${chance}%</div>
                        </div>
                        <div class="precip-chance-info">
                            <div class="precip-chance-time">${displayTime}</div>
                            <div class="precip-chance-desc" style="color: ${textColor}">${precipDesc}</div>
                            <div class="precip-chance-amount"><i class="fas ${isSnow ? 'fa-snowflake' : 'fa-droplet'}"></i> ${precipAmountStr}</div>
                        </div>
                    </div>
                `;
            });
            container.innerHTML = html;
        }

        function renderHourlyForecastData() {
            const full = forecastCache[activeDisplayStationKey]?.hourly ||[];
            const container = document.getElementById('hourly-forecast-container');
            const pagContainer = document.getElementById('forecast-pagination');
            const summaryEl = document.getElementById('precip-summary-text');
            if (!container || !pagContainer || !summaryEl) return;

            updateTextValue('forecast-update-time', `Frissítve: ${formatTime(new Date())}`);

            if (full.length === 0) {
                container.innerHTML = '<div style="font-size: 12px; color: var(--text-secondary); text-align: center; width: 100%; padding: 20px 0;">Nincs előrejelzési adat.</div>';
                return;
            }

            const now = new Date();
            const currentHourStart = new Date(now.getFullYear(), now.getMonth(), now.getDate(), now.getHours(), 0, 0).getTime();

            let startIdx = full.findIndex(h => new Date(h.time).getTime() >= currentHourStart);
            if (startIdx === -1) startIdx = 0;

            let snowLikely = false;
            full.slice(startIdx, startIdx + 8).forEach(h => { if (SNOW_ICON_CODES.includes(h.iconCode) && h.precipChance >= 30) snowLikely = true; });
            const firstP = full.slice(startIdx, startIdx + 8).find(h => h.precipChance >= 30);
            
            let summaryHtml = "";
            if (snowLikely) {
                summaryHtml = `<span style="color: var(--precip-snow-color);">❄️ Havazás lehet kb. ${formatTime(firstP.time)} körül.</span>`;
            } else if (firstP) { 
                summaryHtml = `<span style="color: var(--precip-color);">🌧️ Csapadék lehet kb. ${formatTime(firstP.time)} körül.</span>`;
            } else { 
                summaryHtml = `<span style="color: var(--text-primary);">A következő 8 órában száraz idő várható.</span>`;
            }

            summaryEl.innerHTML = summaryHtml;

            let pagHTML = '';
            for(let i = 0; i < 8; i++) { 
                const cStart = startIdx + (i * 3);
                if (cStart >= full.length) break;
                pagHTML += `<button class="pagination-btn ${i === forecastPage ? 'active' : ''}" data-page="${i}">${formatHourOnly(full[cStart].time)}</button>`;
            }
            pagContainer.innerHTML = pagHTML;

            const sliceStart = startIdx + (forecastPage * 3);
            const toShow = full.slice(sliceStart, sliceStart + 3);
            
            let html = '';
            let lastDay = sliceStart > 0 ? new Date(full[sliceStart - 1].time).getDate() : null;

            toShow.forEach((h, idx) => {
                const date = new Date(h.time);
                const day = date.getDate();

                if (idx === 0 || lastDay !== day) {
                    html += `<div class="day-divider">${formatDateWithDay(date)}</div>`;
                    lastDay = day;
                }

                const wxPhrase = mapIconCodeToHungarianText(h.iconCode, h.dayOrNight);
                const windText = `${degreesToCompassAbbreviated(h.windDirection)} ${formatValue(h.windSpeed, '', 0)} km/h`;

                html += `
                    <div class="hourly-item">
                        <div class="h-time">${formatHourOnly(h.time)}</div>
                        <i class="h-icon ${mapTwcIconToFontAwesome(h.iconCode, h.dayOrNight)}"></i>
                        <div class="h-desc">${wxPhrase}</div>
                        <div class="h-temp">${formatValue(h.temp, '°', 0)}</div>
                        <div class="h-precip"><i class="fas fa-tint"></i> ${formatValue(h.precipChance, '%', 0)}</div>
                        <div class="h-wind">${windText}</div>
                    </div>
                `;
            });
            container.innerHTML = html;
        }

        function renderHistoryChart(dataPoints, stationKey) {
            const ctx = document.getElementById('historyChart');
            if (!ctx) return;
            
            const name = STATIONS[stationKey] ? (STATIONS[stationKey].displayNameShort || STATIONS[stationKey].displayName) : '';
            updateTextValue('title-history-chart', `Napi Grafikon (00:00 - 23:59) - ${name}`);
            updateTextValue('title-history-table', `Részletes Mérési Napló - ${name}`);

            if (!dataPoints || dataPoints.length === 0) {
                if (historyChartInstance) { historyChartInstance.destroy(); }
                return;
            }

            const labels = dataPoints.map(dp => formatTime(dp.timestamp)); 
            const temps = dataPoints.map(dp => dp.temp);
            const winds = dataPoints.map(dp => dp.windSpeed !== undefined ? dp.windSpeed : null); 

            if (historyChartInstance) { historyChartInstance.destroy(); }

            historyChartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets:[
                        {
                            label: 'Hőmérséklet (°C)',
                            data: temps,
                            borderColor: '#ffdd00',
                            backgroundColor: 'rgba(255, 221, 0, 0.1)',
                            borderWidth: 2,
                            tension: 0.4,
                            spanGaps: true, 
                            yAxisID: 'y'
                        },
                        {
                            label: 'Szélsebesség (km/h)',
                            data: winds,
                            borderColor: '#38bdf8',
                            backgroundColor: 'rgba(56, 189, 248, 0.1)',
                            borderWidth: 2,
                            tension: 0.4,
                            spanGaps: true,
                            yAxisID: 'y1'
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: { mode: 'index', intersect: false },
                    plugins: { 
                        legend: { 
                            labels: { color: 'rgba(255,255,255,0.8)', font: { family: 'Inter', size: 11 } } 
                        },
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    let label = context.dataset.label || '';
                                    if (label) {
                                        label += ': ';
                                    }
                                    if (context.parsed.y !== null) {
                                        label += Number(context.parsed.y).toFixed(1);
                                    }
                                    return label;
                                }
                            }
                        }
                    },
                    elements: { point: { radius: 0, hitRadius: 10, hoverRadius: 4 } },
                    scales: {
                        x: { 
                            ticks: { color: 'rgba(255,255,255,0.6)', maxTicksLimit: 24, maxRotation: 0 }, 
                            grid: { color: 'rgba(255,255,255,0.1)' } 
                        },
                        y: { 
                            type: 'linear', 
                            display: true, 
                            position: 'left', 
                            grace: '10%', 
                            ticks: { 
                                color: '#ffdd00', 
                                callback: function(value) { return Number(value).toFixed(1) + ' °C'; } 
                            }, 
                            grid: { color: 'rgba(255,255,255,0.1)' } 
                        },
                        y1: { 
                            type: 'linear', 
                            display: true, 
                            position: 'right', 
                            grace: '10%', 
                            ticks: { 
                                color: '#38bdf8', 
                                callback: function(value) { return Number(value).toFixed(1) + ' km/h'; } 
                            }, 
                            grid: { drawOnChartArea: false }, 
                            beginAtZero: true 
                        }
                    }
                }
            });
        }

        async function fetchAndDisplayForecastsForStation(key) {
            const now = Date.now();
            const cache = forecastCache[key];
            if (cache && (now - cache.lastFetch) < 10 * 60 * 1000) return;
            try {
                const data = await fetchHourlyForecastData(STATIONS[key].coords.lat, STATIONS[key].coords.lon);
                const capeData = await fetchOpenMeteoCape(STATIONS[key].coords.lat, STATIONS[key].coords.lon);
                
                if (data) {
                    forecastCache[key] = { hourly: data, cape: capeData, lastFetch: now };
                }
            } catch (e) {}
        }

        async function initApp() {
            initializeWeatherDisplayDOM();
            
            const keys = Object.keys(STATIONS);
            await Promise.allSettled(keys.map(k => fetchPwsStationData(k)));
            
            const firstOnline = keys.find(k => STATIONS[k].isOnline);
            if (firstOnline && !STATIONS[activeDisplayStationKey].isOnline) {
                activeDisplayStationKey = firstOnline;
            }
            
            const hp = document.getElementById('history-station-picker');
            if (hp) hp.value = activeDisplayStationKey;

            const coords = STATIONS[activeDisplayStationKey].coords;
            
            await fetchMinDateForDatePicker();

            await Promise.allSettled([
                fetchGeneralConditionsData(coords.lat, coords.lon).then(d => { if(d) cachedData.generalConditions = d; }),
                fetchMetarData(),
                fetchAdvancedSunCalcData(coords.lat, coords.lon).then(d => { cachedData.sunCalc = d; }),
                fetchAndDisplayForecastsForStation(activeDisplayStationKey)
            ]);

            updateMainDisplayData();
            loadHistoricalDataFromFirebase();
            
            startMasterLoop();
        }

        function startMasterLoop() { 
            let isPwsUpdating = false;
            let isGenUpdating = false;

            setInterval(async () => {
                if (isPwsUpdating) return;
                isPwsUpdating = true;
                try {
                    const allKeys = Object.keys(STATIONS);
                    await Promise.allSettled(allKeys.map(k => fetchPwsStationData(k)));

                    if (!STATIONS[activeDisplayStationKey].isOnline) {
                        const fallbackStation = allKeys.find(k => STATIONS[k].isOnline);
                        if (fallbackStation) {
                            activeDisplayStationKey = fallbackStation;
                            const radio = document.getElementById(`station-select-${fallbackStation.toLowerCase()}`);
                            if (radio) radio.checked = true;
                            
                            const hp = document.getElementById('history-station-picker');
                            if (hp) hp.value = fallbackStation;
                            
                            fetchAndDisplayForecastsForStation(fallbackStation);
                        }
                    }

                    if (!windowGlobalHistoryCache) windowGlobalHistoryCache =[];
                    allKeys.forEach(k => {
                        const st = STATIONS[k];
                        if (st && st.isOnline && st.data) {
                            let liveTs = Date.now();
                            if (st.data.obsTimeLocal) {
                                const parsed = new Date(st.data.obsTimeLocal).getTime();
                                if (!isNaN(parsed)) liveTs = parsed;
                            }
                            
                            let pts = windowGlobalHistoryCache.filter(p => p.stationId === st.id || p.stationId === k || p.stationInternalId === st.id);
                            pts.sort((a,b) => a.timestamp - b.timestamp);
                            const lastPtTs = pts.length > 0 ? pts[pts.length - 1].timestamp : 0;
                            
                            if (liveTs > lastPtTs + 120000) {
                                windowGlobalHistoryCache.push({
                                    timestamp: liveTs,
                                    stationId: st.id,
                                    temp: st.data.metric.temp,
                                    humidity: st.data.humidity,
                                    windSpeed: st.data.metric.windSpeed,
                                    pressure: st.data.metric.pressure,
                                    uv: st.data.uv !== undefined ? st.data.uv : 0,
                                    precipTotal: st.data.metric.precipTotal !== undefined ? st.data.metric.precipTotal : 0,
                                    precipRate: st.data.metric.precipRate !== undefined ? st.data.metric.precipRate : 0
                                });
                            }
                        }
                    });

                    computePersistentRainTimestamps();
                    updateMainDisplayData(); 

                    if (windowGlobalHistoryCache.length > 0) {
                        processMainStationHistory();
                        processChartStationHistory();
                        
                        const datePicker = document.getElementById('history-date-picker');
                        if (datePicker && datePicker.value) {
                            const tzOffset = (new Date()).getTimezoneOffset() * 60000;
                            const todayStr = (new Date(Date.now() - tzOffset)).toISOString().split('T')[0];
                            if (datePicker.value === todayStr) {
                                searchHistory(); 
                            }
                        }
                    }

                } finally {
                    isPwsUpdating = false;
                }
            }, 60 * 1000); 

            // 5 percenként is frissítjük a CAPE Riasztást
            setInterval(() => {
                renderCAPEAlert();
            }, 5 * 60 * 1000);

            setInterval(async () => {
                if (isGenUpdating) return;
                isGenUpdating = true;
                try {
                    const coords = STATIONS[activeDisplayStationKey].coords;
                    await Promise.allSettled([
                        fetchGeneralConditionsData(coords.lat, coords.lon).then(d => { if(d) cachedData.generalConditions = d; }),
                        fetchMetarData()
                    ]);
                    updateMainDisplayData();
                } finally {
                    isGenUpdating = false;
                }
            }, 2 * 60 * 1000);

            setInterval(() => {
                if (forecastCache[activeDisplayStationKey]) {
                    renderHourlyForecastData();
                    render8HourPrecipChance();
                }
            }, 5 * 60 * 1000);

            setInterval(() => {
                fetchAndDisplayForecastsForStation(activeDisplayStationKey).then(() => {
                    updateMainDisplayData();
                });
            }, 10 * 60 * 1000);

            setInterval(() => {
                const coords = STATIONS[activeDisplayStationKey].coords;
                fetchAdvancedSunCalcData(coords.lat, coords.lon).then(d => { 
                    if (d) cachedData.sunCalc = d; 
                    updateMainDisplayData();
                });
            }, 60 * 60 * 1000);
        }
        
        document.addEventListener('DOMContentLoaded', () => {
            initApp();
        });
    </script>
</body>
