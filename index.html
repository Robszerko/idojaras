        function updateTextValue(id, value) { const el = document.getElementById(id); if(el) el.textContent = value; }

        function renderWeatherData() {
            const obs = cachedData.displayPws; 
            const gen = cachedData.generalConditions; 
            const station = STATIONS[activeDisplayStationKey];
            if (!gen || !obs || !station) return;
            
            const timeNow = formatTime(new Date(), { includeSeconds: true });
            const timeNowShort = formatTime(new Date());

            const statusText = station.isOnline ? '' : ' (Offline)';
            const stName = (station.displayNameShort || station.displayName) + statusText;

            updateTextValue('title-wind', `Széladatok - ${stName}`);
            updateTextValue('title-precip-chance', `Órás Csapadékesély - ${stName}`);

            updateTextValue('location-title-text', station.displayName);
            updateTextValue('main-timestamp', `Frissítve: ${timeNow}`);
            updateTextValue('wind-update-time', `Frissítve: ${timeNowShort}`);
            
            const temp = obs.temp; 
            const windSpeed = obs.windSpeed ?? gen.windSpeed; 
            const feelsLike = gen.temperatureFeelsLike !== undefined && gen.temperatureFeelsLike !== null ? gen.temperatureFeelsLike : temp;

            updateTextValue('current-temp-span', formatValue(temp, '', 1)); 
            updateTextValue('feels-like-temp', formatValue(feelsLike, '°C', 1)); 
            
            const maxT = gen.temperatureMax24Hour;
            const minT = gen.temperatureMin24Hour;
            if(maxT != null && minT != null) {
                updateTextValue('forecast-minmax', `${formatValue(minT, '°', 0)} / ${formatValue(maxT, '°', 0)}`);
            } else {
                updateTextValue('forecast-minmax', '-- / --');
            }
            
            let conditionText = "Ismeretlen";
            let iconClass = "fas fa-cloud";
            let isSnowing = false;
            let isZivatar = false;

            let isNyh = station.useLHNY !== false; 
            let metarAgeMins = 999;
            
            if (cachedData.metarCondition && cachedData.metarCondition.obsTime) {
                let obsMs = new Date(cachedData.metarCondition.obsTime).getTime();
                if (obsMs < 100000000000) obsMs *= 1000; 
                metarAgeMins = (Date.now() - obsMs) / 60000;
            }

            let useMetar = isNyh && cachedData.metarCondition && metarAgeMins <= 20;

            // 1. ALAP: Ha NYH állomás és friss a METAR, használjuk azt, különben TWC (Weather.com)
            if (useMetar) {
                const metar = parseMetarToHungarian(cachedData.metarCondition, gen.dayOrNight === 'D');
                if (metar) {
                    conditionText = metar.phrase;
                    iconClass = metar.iconClass;
                    isSnowing = metar.isSnowing;
                    isZivatar = metar.isZivatar;
                }
            } else {
                conditionText = gen.wxPhraseLong || mapIconCodeToHungarianText(gen.iconCode, gen.dayOrNight);
                iconClass = mapTwcIconToFontAwesome(gen.iconCode, gen.dayOrNight);
                isSnowing = SNOW_ICON_CODES.includes(gen.iconCode);
                const baseLower = conditionText.toLowerCase();
                isZivatar = baseLower.includes('zivatar') ||[3, 4, 37, 38, 47].includes(gen.iconCode);
            }

            // 2. HAZUGSÁGVIZSGÁLÓ (SMART PWS OVERRIDE)
            const isApiRaining = /eső|zápor|szitálás|zivatar|havaz|permet|felhőszakad|hófúvás|hó|jég|csapadék/i.test(conditionText);
            if (isApiRaining && (!obs.precipRate || obs.precipRate === 0)) {
                conditionText = "Felhős"; 
                iconClass = gen.dayOrNight === 'D' ? "fas fa-cloud-sun" : "fas fa-cloud-moon";
                
                // Ha friss a METAR, kérjünk tőle pontos felhőzetet, különben hagyjuk a TWC alapján
                if (useMetar && cachedData.metarCondition.clouds) {
                    const covers = cachedData.metarCondition.clouds.map(c => c.cover);
                    if (covers.includes('OVC')) { conditionText = "Borult"; iconClass = "fas fa-cloud"; }
                    else if (covers.includes('BKN')) { conditionText = "Erősen felhős"; iconClass = "fas fa-cloud"; }
                    else if (covers.includes('SCT')) { conditionText = "Részben felhős"; iconClass = gen.dayOrNight === 'D' ? "fas fa-cloud-sun" : "fas fa-cloud-moon"; }
                    else if (covers.includes('FEW')) { conditionText = "Gyengén felhős"; iconClass = gen.dayOrNight === 'D' ? "fas fa-cloud-sun" : "fas fa-cloud-moon"; }
                    else { conditionText = gen.dayOrNight === 'D' ? "Derült" : "Tiszta ég"; iconClass = gen.dayOrNight === 'D' ? "fas fa-sun" : "fas fa-moon"; }
                } else if (conditionText.toLowerCase().includes('zivatar')) {
                    conditionText = "Erősen felhős";
                    iconClass = "fas fa-cloud";
                }
                isSnowing = false;
                isZivatar = false;
            }

            // 3. NAPSÚGÁRZÁS ALAPÚ AZONNALI TISZTULÁS (Vihar/Eső utáni gyors reagálás)
            let isDayTime = true;
            if (cachedData.sunCalc) {
                const nowMs = new Date().getTime();
                isDayTime = (nowMs > cachedData.sunCalc.sunrise.getTime() && nowMs < cachedData.sunCalc.sunset.getTime());
            } else {
                isDayTime = gen.dayOrNight === 'D';
            }

            if (isDayTime && obs.solarRadiation !== undefined) {
                let solar = obs.solarRadiation;
                let uv = obs.uv || 0;

                if (conditionText.includes("Borult") || conditionText.includes("Erősen felhős") || conditionText.includes("Zivatar") || conditionText.includes("Köd")) {
                    if (solar > 600 || uv >= 4) {
                        conditionText = "Napos";
                        iconClass = "fas fa-sun";
                        isSnowing = false; isZivatar = false;
                    } else if (solar > 250 || uv >= 2) {
                        conditionText = "Részben felhős";
                        iconClass = "fas fa-cloud-sun";
                        isSnowing = false; isZivatar = false;
                    }
                }
                
                if (conditionText.includes("Részben felhős") || conditionText.includes("Gyengén felhős")) {
                    if (solar > 750 || uv >= 5) {
                        conditionText = "Napos";
                        iconClass = "fas fa-sun";
                    }
                }
            }

            // 4. A VALÓSÁG (Ha tényleg esik a PWS mérő szerint)
            if (obs.precipRate > 0) {
                isSnowing = obs.temp !== null && obs.temp < 2; 
                if (isSnowing) {
                    if (obs.precipRate <= 0.5) { conditionText = "Hószállingózás"; iconClass = "fas fa-snowflake"; }
                    else if (obs.precipRate <= 1.5) { conditionText = "Gyenge havazás"; iconClass = "fas fa-snowflake"; }
                    else if (obs.precipRate <= 3.0) { conditionText = "Mérsékelt havazás"; iconClass = "fas fa-snowflake"; }
                    else if (obs.precipRate <= 6.0) { conditionText = "Erős havazás"; iconClass = "fas fa-snowflake"; }
                    else { conditionText = "Intenzív hóvihar"; iconClass = "fas fa-snowflake"; }
                } else if (isZivatar) {
                    if (obs.precipRate <= 2.0) { conditionText = "Gyenge zivatar"; iconClass = "fas fa-cloud-bolt"; }
                    else if (obs.precipRate <= 10.0) { conditionText = "Mérsékelt zivatar"; iconClass = "fas fa-cloud-bolt"; }
                    else if (obs.precipRate <= 25.0) { conditionText = "Heves zivatar"; iconClass = "fas fa-cloud-showers-heavy"; }
                    else { conditionText = "Károkozó heves zivatar"; iconClass = "fas fa-cloud-showers-heavy"; }
                } else {
                    if (obs.precipRate <= 0.5) { conditionText = "Csepergés / Szitálás"; iconClass = "fas fa-cloud-rain"; }
                    else if (obs.precipRate <= 2.0) { conditionText = "Gyenge eső"; iconClass = "fas fa-cloud-rain"; }
                    else if (obs.precipRate <= 5.0) { conditionText = "Mérsékelt eső"; iconClass = "fas fa-cloud-rain"; }
                    else if (obs.precipRate <= 10.0) { conditionText = "Erős eső"; iconClass = "fas fa-cloud-showers-heavy"; }
                    else if (obs.precipRate <= 25.0) { conditionText = "Zuhogó eső / Zápor"; iconClass = "fas fa-cloud-showers-heavy"; }
                    else if (obs.precipRate <= 50.0) { conditionText = "Heves zápor / Felhőszakadás"; iconClass = "fas fa-cloud-showers-water"; }
                    else { conditionText = "Extrém felhőszakadás"; iconClass = "fas fa-cloud-showers-water"; }
                }
            }
            
            updateTextValue('main-condition-text', conditionText);
            const iconEl = document.getElementById('main-condition-icon');
            if(iconEl) iconEl.className = iconClass;
            
            const windDir = obs.winddir ?? gen.windDirection; 
            const windArrow = document.getElementById('wind-compass-arrow'); 
            if (windArrow && windDir !== null) { windArrow.style.transform = `rotate(${windDir}deg)`; }
            
            updateTextValue('wind-speed-value-span', formatValue(windSpeed, '', 1));
            updateTextValue('wind-gust-value', formatValue(obs.windGust, ' km/h', 0)); 
            updateTextValue('wind-direction-full', degreesToCompassFull(windDir)); 
            
            const beaufort = getBeaufort(windSpeed);
            document.documentElement.style.setProperty('--current-wind-color', getWindColor(windSpeed));
            updateTextValue('beaufort-desc', beaufort.desc);
            const bars = document.querySelectorAll('#beaufort-scale-container .beaufort-bar');
            bars.forEach((b, idx) => { b.classList.toggle('active', idx < beaufort.num); });

            let tSymbol = ''; 
            if (gen.pressureTendencyCode === 0) tSymbol = '↑'; 
            else if (gen.pressureTendencyCode === 1) tSymbol = '↓'; 
            else tSymbol = '→';

            updateTextValue('compact-value-humidity', formatValue(obs.humidity ?? gen.relativeHumidity, '%', 0)); 
            updateTextValue('compact-value-pressure', `${formatValue(obs.pressure ?? gen.pressureAltimeter, '', 1)} hPa ${tSymbol}`);
            updateTextValue('compact-value-dewpoint', formatValue(obs.dewpt ?? gen.dewpoint, '°C', 1));
            updateTextValue('compact-value-uv', formatValue(obs.uv ?? gen.uvIndex, '', 1));

            if (cachedData.sunCalc) {
                updateTextValue('compact-value-sunrise', formatTime(cachedData.sunCalc.sunrise));
                updateTextValue('compact-value-sunset', formatTime(cachedData.sunCalc.sunset));
            }
        }

        function renderPrecipitationSummary() {
            const container = document.getElementById('precip-summary-content');
            if(!container) return;
            
            updateTextValue('radar-update-time', `Frissítve: ${formatTime(new Date())}`);

            const stations = Object.values(STATIONS).filter(s => s.isOnline && s.provides.includes('precip') && s.data);
            const withRain = stations.filter(s => s.data && s.data.metric.precipTotal > 0).sort((a, b) => b.data.metric.precipTotal - a.data.metric.precipTotal);

            if (withRain.length > 0) {
                let html = '';
                withRain.forEach(s => {
                    const raining = s.data.metric.precipRate > 0;
                    const cClass = raining ? 'precip-badge raining' : 'precip-badge';
                    
                    let isSnow = false;
                    if (s.data.metric.temp !== null && s.data.metric.temp !== undefined) {
                        isSnow = s.data.metric.temp < 2;
                    }

                    let footerText = '';
                    if (raining) {
                        footerText = `<span style="color: var(--precip-color); font-weight: 800;">Most: ${getPrecipIntensityDescription(s.data.metric.precipRate, isSnow)}</span>`;
                    } else {
                        if (s.lastRainTimestamp) {
                            footerText = `<span style="color: #4ade80; font-weight: 700;">Elállt: ${formatTime(s.lastRainTimestamp)}</span>`;
                        } else {
                            footerText = `<span style="color: #4ade80; font-weight: 700; opacity: 0.8;">Csapadék elállt</span>`;
                        }
                    }
                    
                    html += `
                        <div class="${cClass}">
                            <div class="precip-badge-title">${s.displayNameShort || s.displayName}</div>
                            <div class="precip-badge-value">${formatValue(s.data.metric.precipTotal, '', 1)}<span> mm</span></div>
                            <div class="precip-badge-footer">${footerText}</div>
                        </div>
                    `;
                });
                container.innerHTML = html;
            } else {
                container.innerHTML = `
                <div class="precip-empty-state" style="grid-column: 1 / -1;">
                    <i class="fas fa-info-circle"></i>
                    Jelenleg egyetlen figyelt állomás sem mért csapadékot a mai napon.<br>
                    <strong>Hogyan működik?</strong> A rendszer a helyi PWS hálózat valós idejű adatait figyeli. Ha egy állomás esőt észlel, azonnal megjelenik itt.
                </div>`;
            }
        }

        function render8HourPrecipChance() {
            const full = forecastCache[activeDisplayStationKey]?.hourly ||[];
            const container = document.getElementById('precip-chance-grid');
            const summaryEl = document.getElementById('precip-chance-summary-text');
            if(!container) return;

            updateTextValue('precip-chance-update-time', `Frissítve: ${formatTime(new Date())}`);

            const now = new Date();
            const currentHourStart = new Date(now.getFullYear(), now.getMonth(), now.getDate(), now.getHours(), 0, 0).getTime();
            const endOfToday = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 23, 59, 59).getTime();

            let startIdx = full.findIndex(h => new Date(h.time).getTime() >= currentHourStart);
            if (startIdx === -1) startIdx = 0;

            let totalQpfToday = 0;
            full.forEach(h => {
                const hTime = new Date(h.time).getTime();
                if (hTime >= currentHourStart && hTime <= endOfToday) {
                    totalQpfToday += (h.qpf || 0) + (h.qpfSnow || 0);
                }
            });

            if (summaryEl) {
                if (totalQpfToday > 0) {
                    summaryEl.innerHTML = `<i class="fas fa-droplet"></i> Mai napra előrejelzett: ${totalQpfToday.toFixed(1)} mm`;
                    summaryEl.style.display = 'block';
                } else {
                    summaryEl.style.display = 'none';
                }
            }

            const next8Hours = full.slice(startIdx, startIdx + 8);

            if (next8Hours.length === 0) {
                container.innerHTML = '<div style="font-size: 12px; color: var(--text-secondary);">Nincs elérhető adat.</div>';
                return;
            }

            let html = '';
            next8Hours.forEach(h => {
                const chance = h.precipChance || 0;
                const isSnow = SNOW_ICON_CODES.includes(h.iconCode);
                const ringColor = isSnow ? '#22d3ee' : '#38bdf8'; 
                const trackColor = 'rgba(0,0,0,0.4)'; 
                
                let qpf = h.qpf || 0;
                let qpfSnow = h.qpfSnow || 0;
                let precipDesc = "";
                let precipAmountStr = "";
                
                if (qpf === 0 && qpfSnow === 0) {
                    if (chance >= 15) {
                        precipDesc = "Csepergés esélye";
                        precipAmountStr = "< 0.1 mm";
                    } else {
                        precipDesc = "Száraz idő";
                        precipAmountStr = "0.0 mm";
                    }
                } else {
                    if (isSnow) {
                        precipAmountStr = formatValue(qpfSnow, ' cm', 1);
                        precipDesc = getPrecipIntensityDescription(qpfSnow, true);
                    } else {
                        precipAmountStr = formatValue(qpf, ' mm', 1);
                        precipDesc = getPrecipIntensityDescription(qpf, false);
                    }
                }

                const textColor = chance >= 15 ? ringColor : 'var(--text-secondary)';

                html += `
                    <div class="precip-chance-item">
                        <div class="precip-circular-wrapper">
                            <div class="precip-circular-ring" style="background: conic-gradient(${ringColor} ${chance}%, ${trackColor} 0);"></div>
                            <div class="precip-circular-value">${chance}%</div>
                        </div>
                        <div class="precip-chance-info">
                            <div class="precip-chance-time">${formatHourOnly(h.time)}</div>
                            <div class="precip-chance-desc" style="color: ${textColor}">${precipDesc}</div>
                            <div class="precip-chance-amount"><i class="fas ${isSnow ? 'fa-snowflake' : 'fa-droplet'}"></i> ${precipAmountStr}</div>
                        </div>
                    </div>
                `;
            });
            container.innerHTML = html;
        }

        function renderHourlyForecastData() {
            const full = forecastCache[activeDisplayStationKey]?.hourly ||[];
            const container = document.getElementById('hourly-forecast-container');
            const pagContainer = document.getElementById('forecast-pagination');
            const summaryEl = document.getElementById('precip-summary-text');
            if (!container || !pagContainer || !summaryEl) return;

            updateTextValue('forecast-update-time', `Frissítve: ${formatTime(new Date())}`);

            if (full.length === 0) {
                container.innerHTML = '<div style="font-size: 12px; color: var(--text-secondary); text-align: center; width: 100%; padding: 20px 0;">Nincs előrejelzési adat.</div>';
                return;
            }

            const now = new Date();
            const currentHourStart = new Date(now.getFullYear(), now.getMonth(), now.getDate(), now.getHours(), 0, 0).getTime();

            let startIdx = full.findIndex(h => new Date(h.time).getTime() >= currentHourStart);
            if (startIdx === -1) startIdx = 0;

            let snowLikely = false;
            full.slice(startIdx, startIdx + 8).forEach(h => { if (SNOW_ICON_CODES.includes(h.iconCode) && h.precipChance >= 30) snowLikely = true; });
            const firstP = full.slice(startIdx, startIdx + 8).find(h => h.precipChance >= 30);
            
            let summaryHtml = "";
            if (snowLikely) {
                summaryHtml = `<span style="color: var(--precip-snow-color);">❄️ Havazás lehet kb. ${formatTime(firstP.time)} körül.</span>`;
            } else if (firstP) { 
                summaryHtml = `<span style="color: var(--precip-color);">🌧️ Csapadék lehet kb. ${formatTime(firstP.time)} körül.</span>`;
            } else { 
                summaryHtml = `<span style="color: var(--text-primary);">A következő 8 órában száraz idő várható.</span>`;
            }

            summaryEl.innerHTML = summaryHtml;

            let pagHTML = '';
            for(let i = 0; i < 8; i++) { 
                const cStart = startIdx + (i * 3);
                if (cStart >= full.length) break;
                pagHTML += `<button class="pagination-btn ${i === forecastPage ? 'active' : ''}" data-page="${i}">${formatHourOnly(full[cStart].time)}</button>`;
            }
            pagContainer.innerHTML = pagHTML;

            const sliceStart = startIdx + (forecastPage * 3);
            const toShow = full.slice(sliceStart, sliceStart + 3);
            
            let html = '';
            let lastDay = sliceStart > 0 ? new Date(full[sliceStart - 1].time).getDate() : null;

            toShow.forEach((h, idx) => {
                const date = new Date(h.time);
                const day = date.getDate();

                if (idx === 0 || lastDay !== day) {
                    html += `<div class="day-divider">${formatDateWithDay(date)}</div>`;
                    lastDay = day;
                }

                const wxPhrase = mapIconCodeToHungarianText(h.iconCode, h.dayOrNight);
                const windText = `${degreesToCompassAbbreviated(h.windDirection)} ${formatValue(h.windSpeed, '', 0)} km/h`;

                html += `
                    <div class="hourly-item">
                        <div class="h-time">${formatHourOnly(h.time)}</div>
                        <i class="h-icon ${mapTwcIconToFontAwesome(h.iconCode, h.dayOrNight)}"></i>
                        <div class="h-desc">${wxPhrase}</div>
                        <div class="h-temp">${formatValue(h.temp, '°', 0)}</div>
                        <div class="h-precip"><i class="fas fa-tint"></i> ${formatValue(h.precipChance, '%', 0)}</div>
                        <div class="h-wind">${windText}</div>
                    </div>
                `;
            });
            container.innerHTML = html;
        }

        function renderHistoryChart(dataPoints, stationKey) {
            const ctx = document.getElementById('historyChart');
            if (!ctx) return;
            
            const name = STATIONS[stationKey] ? (STATIONS[stationKey].displayNameShort || STATIONS[stationKey].displayName) : '';
            updateTextValue('title-history-chart', `Napi Grafikon (00:00 - 23:59) - ${name}`);
            updateTextValue('title-history-table', `Részletes Mérési Napló - ${name}`);

            if (!dataPoints || dataPoints.length === 0) {
                if (historyChartInstance) { historyChartInstance.destroy(); }
                return;
            }

            const labels = dataPoints.map(dp => formatTime(dp.timestamp)); 
            const temps = dataPoints.map(dp => dp.temp);
            const winds = dataPoints.map(dp => dp.windSpeed !== undefined ? dp.windSpeed : null); 

            if (historyChartInstance) { historyChartInstance.destroy(); }

            historyChartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets:[
                        {
                            label: 'Hőmérséklet (°C)',
                            data: temps,
                            borderColor: '#ffdd00',
                            backgroundColor: 'rgba(255, 221, 0, 0.1)',
                            borderWidth: 2,
                            tension: 0.4,
                            spanGaps: true, 
                            yAxisID: 'y'
                        },
                        {
                            label: 'Szélsebesség (km/h)',
                            data: winds,
                            borderColor: '#38bdf8',
                            backgroundColor: 'rgba(56, 189, 248, 0.1)',
                            borderWidth: 2,
                            tension: 0.4,
                            spanGaps: true,
                            yAxisID: 'y1'
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: { mode: 'index', intersect: false },
                    plugins: { 
                        legend: { 
                            labels: { color: 'rgba(255,255,255,0.8)', font: { family: 'Inter', size: 11 } } 
                        },
                        tooltip: {

                                    let label = context.dataset.label || '';
                                    if (label) {
                                        label += ': ';
                                    }
                                    if (context.parsed.y !== null) {

                                    }
                                    return label;
                                }
                            }
                        }
                    },
                    elements: { point: { radius: 0, hitRadius: 10, hoverRadius: 4 } },
                    scales: {
                        x: { 
                            ticks: { color: 'rgba(255,255,255,0.6)', maxTicksLimit: 24, maxRotation: 0 }, 
                            grid: { color: 'rgba(255,255,255,0.1)' } 
                        },
                        y: { 
                            type: 'linear', 
                            display: true, 
                            position: 'left', 
                            grace: '10%', 
                            ticks: { 
                                color: '#ffdd00', 
                                callback: function(value) { return Number(value).toFixed(1) + ' °C'; } 
                            }, 
                            grid: { color: 'rgba(255,255,255,0.1)' }

                            display: true, 
                            position: 'right', 
                            grace: '10%', 
                            ticks: { 
                                color: '#38bdf8', 
                                callback: function(value) { return Number(value).toFixed(1) + ' km/h'; } 
                            }, 
                            grid: { drawOnChartArea: false }, 
                            beginAtZero: true 
                        }
                    }
                }
            });
        }

        async function fetchAndDisplayForecastsForStation(key) {
            const now = Date.now();
            const cache = forecastCache[key];
            if (cache && (now - cache.lastFetch) < 10 * 60 * 1000) return;
            try {
                const data = await fetchHourlyForecastData(STATIONS[key].coords.lat, STATIONS[key].coords.lon);
                if (data) forecastCache[key] = { hourly: data, lastFetch: now };
            } catch (e) {}
        }

        async function initApp() {
            initializeWeatherDisplayDOM();
            
            const keys = Object.keys(STATIONS);
            await Promise.allSettled(keys.map(k => fetchPwsStationData(k)));
            
            const firstOnline = keys.find(k => STATIONS[k].isOnline);
            if (firstOnline) {
                activeDisplayStationKey = firstOnline;
                const hp = document.getElementById('history-station-picker');
                if (hp) hp.value = firstOnline;
            }

            const coords = STATIONS[activeDisplayStationKey].coords;
            
            await Promise.allSettled([
                fetchGeneralConditionsData(coords.lat, coords.lon).then(d => { if(d) cachedData.generalConditions = d; }),
                fetchMetarData(),
                fetchAdvancedSunCalcData(coords.lat, coords.lon).then(d => { cachedData.sunCalc = d; }),
                fetchAndDisplayForecastsForStation(activeDisplayStationKey)
            ]);

            updateMainDisplayData();
            loadHistoricalDataFromFirebase();
            
            startMasterLoop();
        }

        function startMasterLoop() { 
            let isPwsUpdating = false;
            let isGenUpdating = false;

            setInterval(async () => {
                if (isPwsUpdating) return;
                isPwsUpdating = true;
                try {
                    const allKeys = Object.keys(STATIONS);
                    await Promise.allSettled(allKeys.map(k => fetchPwsStationData(k)));

                    if (!STATIONS[activeDisplayStationKey].isOnline) {
                        const fallbackStation = allKeys.find(k => STATIONS[k].isOnline);
                        if (fallbackStation) {
                            activeDisplayStationKey = fallbackStation;
                            const radio = document.getElementById(`station-select-${fallbackStation.toLowerCase()}`);
                            if (radio) radio.checked = true;
                            
                            const hp = document.getElementById('history-station-picker');
                            if (hp) hp.value = fallbackStation;
                            
                            fetchAndDisplayForecastsForStation(fallbackStation);
                        }
                    }

                    if (!windowGlobalHistoryCache) windowGlobalHistoryCache =[];
                    allKeys.forEach(k => {
                        const st = STATIONS[k];
                        if (st && st.isOnline && st.data) {
                            let liveTs = Date.now();
                            if (st.data.obsTimeLocal) {
                                const parsed = new Date(st.data.obsTimeLocal).getTime();
                                if (!isNaN(parsed)) liveTs = parsed;
                            }
                            
                            let pts = windowGlobalHistoryCache.filter(p => p.stationId === st.id || p.stationId === k || p.stationInternalId === st.id);
                            pts.sort((a,b) => a.timestamp - b.timestamp);
                            const lastPtTs = pts.length > 0 ? pts[pts.length - 1].timestamp : 0;
                            
                            if (liveTs > lastPtTs + 120000) {
                                windowGlobalHistoryCache.push({
                                    timestamp: liveTs,
                                    stationId: st.id,
                                    temp: st.data.metric.temp,
                                    humidity: st.data.metric.humidity,
                                    windSpeed: st.data.metric.windSpeed,
                                    pressure: st.data.metric.pressure,
                                    uv: st.data.metric.uv !== undefined ? st.data.metric.uv : (st.data.uv || 0),
                                    precipTotal: st.data.metric.precipTotal !== undefined ? st.data.metric.precipTotal : 0,
                                    precipRate: st.data.metric.precipRate !== undefined ? st.data.metric.precipRate : 0
                                });
                            }
                        }
                    });

                    updateMainDisplayData(); 

                    if (windowGlobalHistoryCache.length > 0) {
                        processMainStationHistory();
                        processChartStationHistory();
                        
                        const datePicker = document.getElementById('history-date-picker');
                        if (datePicker && datePicker.value) {
                            const tzOffset = (new Date()).getTimezoneOffset() * 60000;
                            const todayStr = (new Date(Date.now() - tzOffset)).toISOString().split('T')[0];
                            if (datePicker.value === todayStr) {
                                searchHistory(); 
                            }
                        }
                    }

                } finally {
                    isPwsUpdating = false;
                }
            }, 60 * 1000); 

            setInterval(async () => {
                if (isGenUpdating) return;
                isGenUpdating = true;
                try {
                    const coords = STATIONS[activeDisplayStationKey].coords;
                    await Promise.allSettled([
                        fetchGeneralConditionsData(coords.lat, coords.lon).then(d => { if(d) cachedData.generalConditions = d; }),
                        fetchMetarData()
                    ]);
                    updateMainDisplayData();
                } finally {
                    isGenUpdating = false;
                }
            }, 2 * 60 * 1000);

            setInterval(() => {
                if (forecastCache[activeDisplayStationKey]) {
                    renderHourlyForecastData();
                    render8HourPrecipChance();
                }
            }, 5 * 60 * 1000);

            setInterval(() => {
                fetchAndDisplayForecastsForStation(activeDisplayStationKey).then(() => {
                    updateMainDisplayData();
                });
            }, 10 * 60 * 1000);

            setInterval(() => {
                const coords = STATIONS[activeDisplayStationKey].coords;
                fetchAdvancedSunCalcData(coords.lat, coords.lon).then(d => { 
                    if (d) cachedData.sunCalc = d; 
                    updateMainDisplayData();
                });
            }, 60 * 60 * 1000);
        }
        
        document.addEventListener('DOMContentLoaded', () => {
            initApp();
        });
    </script>
</body>
</html>
