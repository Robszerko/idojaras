<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Időjárás Monitor - Nyíregyháza & Archívum</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <!-- SunCalc a napkelte/napnyugta számításhoz -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/suncalc/1.8.0/suncalc.min.js"></script>
    
    <!-- Chart.js a grafikonokhoz -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- Firebase Compat -->
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-database-compat.js"></script>

    <style>
        /* --- ALAPVETŐ STABILITÁSI JAVÍTÁSOK (Villogás, elcsúszás ellen) --- */
        *, *::before, *::after {
            box-sizing: border-box;
        }

        html, body {
            max-width: 100vw;
            overflow-x: hidden;
        }

        :root {
            /* Dinamikus témaváltozók - a JS fogja felülírni a 10 fázis alapján */
            --current-bg-body: linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%);
            --current-glass-bg: rgba(15, 23, 42, 0.45);
            --current-glass-border: rgba(255, 255, 255, 0.1);
            --current-glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
            --current-accent: #38bdf8;
            
            /* Általános Fix Színek */
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.7);
            --current-wind-color: #38bdf8;
            --precip-color: #38bdf8; 
            --precip-snow-color: #a5f3fc;
        }

        .is-hidden { display: none !important; }

        body { 
            font-family: 'Inter', sans-serif; 
            font-variant-numeric: tabular-nums; 
            background: var(--current-bg-body); 
            color: var(--text-primary);
            min-height: 100vh; 
            margin: 0; 
            padding: 20px; 
            display: flex; 
            justify-content: center;
            align-items: flex-start; 
            transition: background 1.5s ease;
        }

        /* --- ÜVEGHATÁSÚ FŐ KONTÉNER --- */
        .weather-dashboard {
            width: 100%;
            max-width: 950px;
            background: var(--current-glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--current-glass-border);
            border-radius: 24px;
            box-shadow: var(--current-glass-shadow);
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            transition: background 0.5s ease, border 0.5s ease, box-shadow 0.5s ease;
            margin-bottom: 20px;
        }

        /* --- FEJLÉC --- */
        .header-section { display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: 16px; width: 100%; }
        .location-info { display: flex; flex-direction: column; gap: 4px; }
        .location-title { font-size: 26px; font-weight: 800; margin: 0; letter-spacing: -0.5px; text-shadow: 0 2px 4px rgba(0,0,0,0.2); }
        .update-time { font-size: 11px; font-weight: 600; color: var(--text-secondary); background: rgba(0, 0, 0, 0.2); padding: 4px 10px; border-radius: 12px; display: inline-block; width: max-content; }

        .station-tabs { display: flex; flex-wrap: wrap; gap: 6px; justify-content: flex-end; width: 100%; }
        .station-selector input[type="radio"] { display: none; }
        .station-selector label { cursor: pointer; padding: 6px 12px; background: rgba(255, 255, 255, 0.05); border: 1px solid var(--current-glass-border); border-radius: 8px; font-size: 11px; font-weight: 600; color: var(--text-secondary); display: flex; align-items: center; gap: 6px; transition: all 0.2s ease; }
        .station-selector input[type="radio"]:checked + label { background: var(--current-accent); color: #000; font-weight: 700; border-color: var(--current-accent); box-shadow: 0 0 10px rgba(255,255,255,0.2); }
        .station-selector.disabled label { opacity: 0.3; cursor: not-allowed; }
        
        .status-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
        .status-dot.online { background-color: #22c55e; }
        .status-dot.offline { background-color: #ef4444; }

        /* --- ÁLTALÁNOS KÁRTYA STÍLUSOK --- */
        .glass-card { background: rgba(0, 0, 0, 0.15); border: 1px solid var(--current-glass-border); border-radius: 16px; padding: 20px; display: flex; flex-direction: column; width: 100%; }
        .glass-card-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--text-secondary); margin-bottom: 12px; display: flex; align-items: center; justify-content: space-between; gap: 8px; flex-wrap: wrap; }
        .glass-card-title-left { display: flex; align-items: center; gap: 8px; }
        .glass-card-title i { color: var(--current-accent); font-size: 14px; }
        .card-update-time { font-size: 9px; font-weight: 700; color: var(--text-secondary); background: rgba(0,0,0,0.25); padding: 3px 8px; border-radius: 8px; letter-spacing: 0.5px; text-transform: none; }

        /* HERO KÁRTYA & ÚJ ELRENDEZÉS */
        .hero-card { display: flex; flex-direction: row; flex-wrap: wrap; justify-content: center; align-items: stretch; gap: 20px; background: linear-gradient(135deg, rgba(255,255,255,0.1), rgba(0,0,0,0.1)); }
        
        .hero-left-col { display: flex; flex-direction: column; align-items: center; justify-content: center; flex: 1; min-width: 250px; gap: 5px; transition: all 0.5s ease; }
        .hero-right-col { display: flex; flex-direction: column; flex: 1.2; min-width: 280px; transition: all 0.5s ease; }

        .temp-and-condition { display: flex; align-items: center; gap: 20px; flex-wrap: wrap; justify-content: center; width: 100%; }
        .current-temp-value { font-size: 64px; font-weight: 900; line-height: 1; text-shadow: 0 4px 12px rgba(0,0,0,0.3); display: flex; align-items: flex-start; }
        .current-temp-value span:last-child { font-size: 28px; font-weight: 700; vertical-align: top; margin-top: 6px; }
        
        .condition-block-hero { display: flex; align-items: center; gap: 12px; }
        .condition-block-hero i { font-size: 48px; color: var(--current-accent); text-shadow: 0 0 20px rgba(255,255,255,0.2); }
        .condition-block-hero span { font-size: 18px; font-weight: 700; text-transform: capitalize; max-width: 200px; line-height: 1.2; text-align: left; display: flex; align-items: center; min-height: 2.6em; }

        .feels-like-badge { font-size: 13px; color: var(--text-secondary); background: rgba(0,0,0,0.25); border: 1px solid rgba(255,255,255,0.05); padding: 5px 14px; border-radius: 12px; font-weight: 600; display: inline-block; margin-top: 5px; }

        .daily-stat-box { display: flex; flex-direction: column; gap: 6px; background: rgba(0,0,0,0.2); padding: 10px 12px; border-radius: 12px; border: 1px solid var(--current-glass-border); }
        .stat-box-title { font-size: 10px; color: var(--text-secondary); margin-bottom: 4px; text-transform: uppercase; font-weight: 800; letter-spacing: 1px; display: flex; align-items: center; gap: 6px; }
        
        .minmax-row { display: flex; align-items: center; gap: 6px; font-size: 12px; justify-content: space-between; }
        .mm-label { color: var(--text-secondary); font-weight: 700; flex-shrink: 0;}
        .mm-val { font-weight: 800; color: #fff; text-align: right; flex-grow: 1;}
        .mm-time { font-size: 10px; color: var(--current-accent); font-weight: 700; background: rgba(0,0,0,0.3); padding: 2px 6px; border-radius: 6px; flex-shrink: 0;}

        /* CSS az Élő Csapadék Napló harmonika (kattintható) funkciójához */
        .rain-event-closed .rain-event-details { display: none; }
        .rain-event-closed.expanded .rain-event-details { display: flex; }
        .rain-event-closed.expanded .expand-icon { transform: rotate(180deg); }
        #live-rain-log-content { overflow-x: hidden; }

        /* Egyedi belső görgetősáv az események lenyíló tartalmaihoz */
        .scrollable-details::-webkit-scrollbar { width: 4px; }
        .scrollable-details::-webkit-scrollbar-track { background: rgba(0,0,0,0.1); border-radius: 4px; }
        .scrollable-details::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.3); border-radius: 4px; }

        /* SCROLLBAR A FŐ NAPLÓHOZ */
        #live-rain-log-content::-webkit-scrollbar { width: 4px; }
        #live-rain-log-content::-webkit-scrollbar-track { background: transparent; }
        #live-rain-log-content::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 4px; }

        /* METRICS ROW */
        .metrics-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 12px; width: 100%; }
        .metric-item { background: rgba(0, 0, 0, 0.15); border: 1px solid var(--current-glass-border); border-radius: 12px; padding: 12px; display: flex; flex-direction: column; align-items: center; text-align: center; }
        .metric-label { font-size: 11px; font-weight: 600; color: var(--text-secondary); margin-bottom: 4px; display: flex; align-items: center; gap: 6px; }
        .metric-label i { color: var(--current-accent); }
        .metric-value { font-size: 16px; font-weight: 800; }
        
        /* WIND CARD (TELJES SZÉLESSÉG) */
        .wind-content { display: flex; align-items: center; gap: 20px; flex-grow: 1; justify-content: center; flex-wrap: wrap; width: 100%; }
        .wind-compass-container { position: relative; width: 110px; height: 110px; border-radius: 50%; background: rgba(0,0,0,0.2); border: 1px solid var(--current-glass-border); flex-shrink: 0; }
        .wind-compass-rose { width: 100%; height: 100%; }
        .wind-compass-rose .tick { stroke: var(--text-secondary); }
        .wind-compass-rose text { fill: var(--text-primary); font-size: 13px; font-weight: 700; text-anchor: middle; }
        
        #wind-compass-arrow { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            transform-origin: center center; transition: transform 0.5s ease-out; z-index: 2; 
        }
        #wind-compass-arrow path { fill: var(--current-wind-color); filter: drop-shadow(0 2px 4px rgba(0,0,0,0.6)); }
        #wind-compass-arrow circle { fill: var(--text-primary); filter: drop-shadow(0 1px 2px rgba(0,0,0,0.5)); }

        .wind-stats { display: flex; flex-direction: column; gap: 6px; min-width: 250px; }
        .wind-speed-main { font-size: 34px; font-weight: 900; color: var(--current-wind-color); line-height: 1; }
        .wind-speed-main span:last-child { font-size: 16px; color: var(--text-secondary); }
        .wind-text { font-size: 14px; font-weight: 600; color: var(--text-secondary); }
        .wind-text strong { color: var(--text-primary); }
        .beaufort-bar-container { display: flex; gap: 3px; height: 8px; margin-top: 8px; width: 100%; }
        .beaufort-bar { flex-grow: 1; background-color: rgba(255,255,255,0.1); border-radius: 4px; }
        .beaufort-bar.active { background-color: var(--current-wind-color); }

        /* PRECIP SUMMARY CARD (RADAR) */
        .precip-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 12px; flex-grow: 1; width: 100%; }
        .precip-badge { background: rgba(0,0,0,0.2); border: 1px solid var(--current-glass-border); border-radius: 12px; padding: 12px; text-align: center; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: transform 0.2s; }
        .precip-badge:hover { transform: translateY(-2px); }
        .precip-badge.raining { border-color: var(--precip-color); background: rgba(56, 189, 248, 0.25); box-shadow: 0 0 15px rgba(56, 189, 248, 0.3); }
        .precip-badge-title { font-size: 12px; font-weight: 700; color: var(--text-secondary); margin-bottom: 6px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; width: 100%; }
        .precip-badge-value { font-size: 22px; font-weight: 800; line-height: 1; margin-bottom: 4px; }
        .precip-badge-value span { font-size: 12px; color: var(--text-secondary); }
        .precip-badge-footer { font-size: 11px; font-weight: 600; color: var(--text-secondary); margin-top: auto; line-height: 1.3; }
        .precip-badge.raining .precip-badge-footer { color: var(--precip-color); font-weight: 800; text-shadow: 0 1px 2px rgba(0,0,0,0.5); }
        
        .precip-empty-state { font-size: 13px; color: var(--text-secondary); text-align: center; padding: 15px; line-height: 1.6; background: rgba(0,0,0,0.1); border-radius: 12px; border: 1px dashed rgba(255,255,255,0.1); }
        .precip-empty-state i { font-size: 20px; color: var(--current-accent); margin-bottom: 8px; display: block; }

        /* 8-HOUR CHANCE GRID (KÖRKÖRÖS GYŰRŰ) */
        .precip-chance-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px; }
        .precip-chance-item { background: rgba(0,0,0,0.25); border-radius: 12px; padding: 12px 14px; display: flex; align-items: center; gap: 14px; border: 1px solid rgba(255,255,255,0.05); }
        
        .precip-circular-wrapper { position: relative; width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .precip-circular-ring { position: absolute; width: 100%; height: 100%; border-radius: 50%; -webkit-mask: radial-gradient(closest-side, transparent 75%, black 76%); mask: radial-gradient(closest-side, transparent 75%, black 76%); }
        .precip-circular-value { font-size: 12px; font-weight: 900; z-index: 2; color: #ffffff; text-shadow: 0 1px 4px rgba(0,0,0,0.9); }

        .precip-chance-info { display: flex; flex-direction: column; gap: 3px; flex-grow: 1; }
        .precip-chance-time { font-size: 13px; font-weight: 800; color: var(--text-primary); display: flex; align-items: center; gap: 6px; }
        .precip-chance-desc { font-size: 11px; font-weight: 700; line-height: 1.2; text-shadow: 0 1px 2px rgba(0,0,0,0.5); }
        .precip-chance-amount { font-size: 10px; font-weight: 600; color: var(--text-secondary); display: flex; align-items: center; gap: 4px; }

        /* HORIZONTÁLIS ELŐREJELZÉS */
        .forecast-header { display: flex; flex-direction: column; margin-bottom: 16px; gap: 12px; }
        .forecast-header-top { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
        .forecast-summary-text { font-size: 13px; font-weight: 600; background: rgba(0,0,0,0.2); padding: 6px 14px; border-radius: 8px; }
        
        .pagination-container { display: flex; flex-wrap: wrap; gap: 4px; justify-content: flex-end; max-width: 100%; }
        .pagination-btn { background: rgba(0,0,0,0.2); border: 1px solid var(--current-glass-border); color: var(--text-secondary); padding: 6px 10px; border-radius: 8px; font-size: 11px; font-weight: 700; cursor: pointer; transition: all 0.2s; }
        .pagination-btn.active { background: var(--current-accent); color: #000; border-color: var(--current-accent); }
        .pagination-btn:hover { background: rgba(255,255,255,0.1); }
        .pagination-btn.active:hover { background: var(--current-accent); }
        
        .hourly-horizontal-list { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 5px; width: 100%; scrollbar-width: none; }
        .hourly-horizontal-list::-webkit-scrollbar { display: none; }
        
        .hourly-item { flex: 1 1 0; min-width: 100px; background: rgba(0, 0, 0, 0.15); border: 1px solid var(--current-glass-border); border-radius: 12px; padding: 12px 6px; display: flex; flex-direction: column; align-items: center; gap: 8px; text-align: center; overflow: hidden; }
        .h-time { font-size: 13px; font-weight: 700; color: var(--text-secondary); }
        .h-icon { font-size: 24px; color: var(--current-accent); }
        .h-desc { font-size: 11px; font-weight: 600; color: var(--text-secondary); text-transform: capitalize; line-height: 1.2; min-height: 26px; display: flex; align-items: center; justify-content: center; word-break: break-word; margin-bottom: 2px; }
        .h-temp { font-size: 20px; font-weight: 900; }
        .h-precip { font-size: 12px; font-weight: 600; color: var(--precip-color); display: flex; align-items: center; gap: 4px; }
        .h-wind { font-size: 11px; font-weight: 700; color: var(--text-secondary); white-space: nowrap; }
        
        .day-divider { flex: 0 0 auto; writing-mode: vertical-rl; text-orientation: mixed; transform: rotate(180deg); font-size: 11px; font-weight: 800; text-transform: uppercase; color: var(--text-secondary); display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.2); border-radius: 8px; padding: 0 4px; }

        /* GÖRDÍTHETŐ GRAFIKON CONTAINER (ZSÚFOLTSÁG ELLEN) */
        .chart-scroll-wrapper { width: 100%; overflow-x: auto; overflow-y: hidden; border-radius: 12px; border: 1px solid var(--current-glass-border); background: rgba(0,0,0,0.15); }
        .chart-inner-container { min-width: 800px; height: 260px; padding: 15px; box-sizing: border-box; }
        
        .footer-credit { text-align: center; font-size: 11px; color: var(--text-secondary); font-weight: 600; opacity: 0.7; margin-top: 10px; }

        /* TÁBLÁZAT STÍLUSOK ÉS NAPSZAK ELVÁLASZTÓK */
        .history-table-container { overflow-x: auto; margin-top: 10px; max-height: 350px; overflow-y: auto; border-radius: 12px; background: rgba(0,0,0,0.2); border: 1px solid var(--current-glass-border); }
        .history-table { width: 100%; border-collapse: collapse; font-size: 13px; text-align: left; }
        .history-table th { position: sticky; top: 0; background: rgba(20,20,20,0.95); padding: 12px 8px; color: var(--text-secondary); border-bottom: 2px solid var(--current-glass-border); z-index: 2; white-space: nowrap; }
        .history-table td { padding: 10px 8px; border-bottom: 1px solid rgba(255,255,255,0.05); white-space: nowrap; }
        
        /* Kifejezetten a csapadék oszlop törése miatt */
        .history-table td:last-child { white-space: normal; word-break: break-word; min-width: 130px; line-height: 1.4; }
        
        .sun-event-row { font-weight: 800; font-size: 12px; text-align: center; text-transform: uppercase; letter-spacing: 2px;}
        .sun-event-row td { padding: 12px 8px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .row-sunrise { background: linear-gradient(90deg, rgba(255, 150, 0, 0.05) 0%, rgba(255, 200, 0, 0.25) 50%, rgba(255, 150, 0, 0.05) 100%); color: #ffdd00; text-shadow: 0 1px 3px rgba(0,0,0,0.8); }
        .row-sunset { background: linear-gradient(90deg, rgba(150, 0, 255, 0.05) 0%, rgba(255, 50, 100, 0.25) 50%, rgba(150, 0, 255, 0.05) 100%); color: #ff6b6b; text-shadow: 0 1px 3px rgba(0,0,0,0.8); }

        .date-input { background: rgba(255,255,255,0.1); border: 1px solid var(--current-glass-border); color: white; padding: 6px; border-radius: 8px; font-family: inherit; font-size: 12px; cursor: pointer;}
        .date-input option { background: #111827; color: #ffffff; }

        @media (max-width: 600px) {
            .hero-card { flex-direction: column; text-align: center; }
            .hero-left-col { width: 100%; min-width: 100%; }
            .hero-right-col { width: 100%; min-width: 100%; }
            
            .temp-and-condition { flex-direction: column; gap: 15px; }
            .condition-block-hero { flex-direction: column; }
            .condition-block-hero span { text-align: center; justify-content: center; min-height: auto; }
            
            .precip-chance-item { padding: 8px 10px; gap: 10px; flex-direction: column; align-items: center; text-align: center; }
            .precip-chance-info { align-items: center; }
            .wind-content { flex-direction: column; text-align: center; width: 100%; }
            .wind-stats { min-width: unset; align-items: center; width: 100%; }
            .station-tabs { justify-content: center; }
            
            /* Táblázat mobil nézet finomhangolás */
            .history-table th, .history-table td { padding: 6px 4px; font-size: 11px; white-space: nowrap; }
            .history-table td:last-child { min-width: 100px; font-size: 10px; }
            .history-table th { font-size: 10px; }
            .date-filter-container { width: 100%; display: flex; justify-content: flex-start; flex-wrap: wrap; gap: 6px;}
            .date-input { flex-grow: 1; font-size: 12px; width: 100%; }
        }
    </style>
</head>

        const firebaseConfig = {

        const NYIREGYHAZA_COORDS = { lat: 47.9550, lon: 21.7160 };
        
        // --- 8 FŐ ÁLLOMÁS (useLHNY flaggel) + RADAR ÁLLOMÁSOK ---
        // A Nyíregyházához közeli állomások a helyi (LHNY) repülőteret használják égképre, a vidékiek (Nagyhalász, Szakoly) a lokális TWC-t.
        const STATIONS = {

        function parseMetarToHungarian(metarObj, isDay) {
            if (!metarObj) return null;
            let phrase = "";
            let iconClass = "fas fa-cloud";
            let isSnowing = false;
            let isZivatar = false;

            if (metarObj.wxString) {
                const wx = metarObj.wxString.toUpperCase();
                if (wx.includes('TS')) { phrase = "Zivatar"; iconClass = "fas fa-cloud-bolt"; isZivatar = true; }
                else if (wx.includes('SHSN') || wx.includes('SHGS')) { phrase = "Hózápor"; iconClass = "fas fa-snowflake"; isSnowing = true; }
                else if (wx.includes('SHRA') || wx.includes('SH')) { phrase = "Zápor"; iconClass = "fas fa-cloud-showers-heavy"; }
                else if (wx.includes('SN')) { phrase = "Havazás"; iconClass = "fas fa-snowflake"; isSnowing = true; }
                else if (wx.includes('DZ')) { phrase = "Szitálás"; iconClass = "fas fa-cloud-rain"; }
                else if (wx.includes('RA')) { phrase = "Eső"; iconClass = "fas fa-cloud-rain"; }
                else if (wx.includes('FG')) { phrase = "Köd"; iconClass = "fas fa-smog"; }
                else if (wx.includes('BR')) { phrase = "Pára"; iconClass = "fas fa-smog"; }
                
                if (phrase) {
                    if (wx.includes('-')) phrase = "Gyenge " + phrase.toLowerCase();
                    if (wx.includes('+')) phrase = "Erős " + phrase.toLowerCase();
                    phrase = phrase.charAt(0).toUpperCase() + phrase.slice(1);
                }
            }
            
            if (!phrase) {
                let maxCover = "CLR";
                if (metarObj.rawOb && metarObj.rawOb.includes('CAVOK')) {
                    maxCover = "CLR";
                } else if (metarObj.clouds && metarObj.clouds.length > 0) {
                    const covers = metarObj.clouds.map(c => c.cover);
                    if (covers.includes('OVC')) maxCover = 'OVC';
                    else if (covers.includes('BKN')) maxCover = 'BKN';
                    else if (covers.includes('SCT')) maxCover = 'SCT';
                    else if (covers.includes('FEW')) maxCover = 'FEW';
                }
                
                switch(maxCover) {
                    case 'OVC': phrase = "Borult"; iconClass = "fas fa-cloud"; break;
                    case 'BKN': phrase = "Erősen felhős"; iconClass = "fas fa-cloud"; break;
                    case 'SCT': phrase = "Részben felhős"; iconClass = isDay ? "fas fa-cloud-sun" : "fas fa-cloud-moon"; break;
                    case 'FEW': phrase = "Gyengén felhős"; iconClass = isDay ? "fas fa-cloud-sun" : "fas fa-cloud-moon"; break;
                    case 'CLR': case 'SKC': default: phrase = isDay ? "Derült" : "Tiszta ég"; iconClass = isDay ? "fas fa-sun" : "fas fa-moon"; break;
                }
            }
            return { phrase, iconClass, isSnowing, isZivatar };
        }

                let startIndex = data.validTimeLocal.map(t => new Date(t).getTime()).findIndex(timeMs => timeMs >= currentHourStart); 
                if (startIndex === -1) startIndex = 0; 
                const forecastLimit = Math.min(startIndex + 72, data.validTimeLocal.length); 
                for (let i = startIndex; i < forecastLimit; i++) { hourlyForecasts.push({ time: data.validTimeLocal[i], temp: data.temperature[i], iconCode: data.iconCode[i], precipChance: data.precipChance[i], qpf: data.qpf[i], qpfSnow: (data.qpfSnow && data.qpfSnow[i] !== undefined) ? data.qpfSnow[i] : null, dayOrNight: data.dayOrNight[i], windSpeed: data.windSpeed[i], windDirection: data.windDirection[i], wxPhraseShort: data.wxPhraseShort[i] }); }

        function getEnrichedHistory(targetKey) {
            if (!windowGlobalHistoryCache) return[];
            
            const targetId = STATIONS[targetKey].id;
            let pts = windowGlobalHistoryCache.filter(p => 
                p.stationId === targetId || p.stationId === targetKey || p.stationInternalId === targetId
            );
            pts.sort((a, b) => a.timestamp - b.timestamp);
            
            const st = STATIONS[targetKey];
            if (st && st.isOnline && st.data) {
                let liveTs = Date.now();
                if (st.data.obsTimeLocal) {
                    const parsed = new Date(st.data.obsTimeLocal).getTime();
                    if (!isNaN(parsed)) liveTs = parsed;
                }
                
                const lastPtTs = pts.length > 0 ? pts[pts.length - 1].timestamp : 0;
                
                if (pts.length === 0 || liveTs > lastPtTs + 120000) {
                    pts.push({
                        timestamp: liveTs,
                        stationId: targetId,
                        temp: st.data.metric.temp,
                        humidity: st.data.metric.humidity,
                        windSpeed: st.data.metric.windSpeed,
                        pressure: st.data.metric.pressure,
                        uv: st.data.metric.uv !== undefined ? st.data.metric.uv : (st.data.uv || 0),
                        precipTotal: st.data.metric.precipTotal !== undefined ? st.data.metric.precipTotal : 0,
                        precipRate: st.data.metric.precipRate !== undefined ? st.data.metric.precipRate : 0
                    });
                }
            }
            return pts;
        }

        function loadHistoricalDataFromFirebase() {

                allPoints.sort((a, b) => a.timestamp - b.timestamp);
                
                windowGlobalHistoryCache = allPoints;
                
                processMainStationHistory();
                processChartStationHistory();
                
                const datePicker = document.getElementById('history-date-picker');
                if (datePicker && datePicker.value) {
                    const tzOffset = (new Date()).getTimezoneOffset() * 60000;
                    const todayStr = (new Date(Date.now() - tzOffset)).toISOString().split('T')[0];
                    if (datePicker.value === todayStr) {
                        searchHistory(); 
                    }
                }
            });
        }

        function processMainStationHistory() {
            const targetKey = activeDisplayStationKey;
            let filteredPoints = getEnrichedHistory(targetKey);

            const bannerEl = document.getElementById('offline-warning-banner');
            const lastSeenEl = document.getElementById('offline-last-seen');
            if (STATIONS[targetKey] && !STATIONS[targetKey].isOnline && filteredPoints.length > 0) {
                const lastPoint = filteredPoints[filteredPoints.length - 1];
                if (bannerEl && lastSeenEl) {
                    lastSeenEl.textContent = formatLastSeen(lastPoint.timestamp);
                    bannerEl.classList.remove('is-hidden');
                }
            } else if (bannerEl) {
                bannerEl.classList.add('is-hidden');
            }

            calculateActualDailyStats(filteredPoints);
            renderLiveRainLog(filteredPoints);
        }

        function processChartStationHistory() {
            const chartTimeEl = document.getElementById('chart-update-time');
            if (chartTimeEl) chartTimeEl.textContent = `Frissítve: ${formatTime(new Date())}`;

            const picker = document.getElementById('history-station-picker');
            let targetKey = picker ? picker.value : activeDisplayStationKey;
            if(!targetKey || !STATIONS[targetKey]) targetKey = activeDisplayStationKey;
            
            let filteredPoints = getEnrichedHistory(targetKey);
            
            const todayStr = new Date().toLocaleDateString("hu-HU");
            let todayPoints = filteredPoints.filter(p => new Date(p.timestamp).toLocaleDateString("hu-HU") === todayStr);

            const nowObj = new Date();
            const y = nowObj.getFullYear();
            const m = nowObj.getMonth();
            const d = nowObj.getDate();

            let uniqueMap = new Map();

            for (let hour = 0; hour < 24; hour++) {
                for (let min = 0; min < 60; min += 30) {
                    let ts = new Date(y, m, d, hour, min, 0).getTime();
                    let timeStr = formatTime(ts);
                    uniqueMap.set(timeStr, { timestamp: ts, temp: null, windSpeed: null });
                }
            }
            
            let endTs = new Date(y, m, d, 23, 59, 59).getTime();
            uniqueMap.set(formatTime(endTs), { timestamp: endTs, temp: null, windSpeed: null });

            todayPoints.forEach(dp => {
                let dpDate = new Date(dp.timestamp);
                let h = dpDate.getHours();
                let min = dpDate.getMinutes();
                
                let closestMin = min < 15 ? 0 : (min < 45 ? 30 : 60);
                let snapH = h;
                if (closestMin === 60) {
                    closestMin = 0;
                    snapH += 1;
                }
                
                if (snapH < 24) {
                    let ts = new Date(y, m, d, snapH, closestMin, 0).getTime();
                    let timeStr = formatTime(ts);
                    
                    let existing = uniqueMap.get(timeStr);
                    if (existing) {
                        existing.temp = dp.temp;
                        if (dp.windSpeed !== undefined && dp.windSpeed !== null) {
                            existing.windSpeed = dp.windSpeed;
                        }
                    }
                } else if (snapH === 24) {
                    let existing = uniqueMap.get(formatTime(endTs));
                    if (existing) {
                        existing.temp = dp.temp;
                        if (dp.windSpeed !== undefined && dp.windSpeed !== null) {
                            existing.windSpeed = dp.windSpeed;
                        }
                    }
                }
            });

            let finalChartPoints = Array.from(uniqueMap.values());
            finalChartPoints.sort((a, b) => a.timestamp - b.timestamp);

            renderHistoryChart(finalChartPoints, targetKey);
        }

        function handleHistoryStationChange() {
            if(windowGlobalHistoryCache && windowGlobalHistoryCache.length > 0) {
                processChartStationHistory();
            }
            searchHistory();
        }

        function renderLiveRainLog(allStationPoints) {
            const logBox = document.getElementById('live-rain-log-content');
            const totalBox = document.getElementById('live-rain-log-total');
            const rainCol = document.getElementById('hero-rain-col');
            if (!logBox || !totalBox || !rainCol) return;

            logBox.style.maxHeight = '300px';

            let events =[];
            let currentEvent = null;
            let prevTotal = 0;
            let offset = 0; 

            for (let i = 0; i < allStationPoints.length; i++) {
                let p = allStationPoints[i];
                let rawTotal = p.precipTotal || 0;
                
                if (rawTotal < prevTotal - 0.5) {
                    offset += prevTotal;
                }
                let continuousTotal = rawTotal + offset;
                let inc = continuousTotal - (prevTotal + offset);
                if (inc < 0) inc = 0;
                prevTotal = rawTotal;
                
                let rate = p.precipRate || 0;
                let isRainingNow = rate > 0 || inc > 0;
                
                if (isRainingNow) {
                    if (!currentEvent) {
                        let fudgeMs = 300000; 
                        if (rate > 5) fudgeMs = 60000; 
                        else if (rate > 2) fudgeMs = 180000; 
                        else if (rate > 0.5) fudgeMs = 300000; 
                        else fudgeMs = 480000; 

                        let st = p.timestamp - fudgeMs;
                        if (events.length > 0 && st <= events[events.length-1].end) {
                            st = events[events.length-1].end + 60000;
                        }

                        currentEvent = { 
                            start: st, 
                            end: null, 
                            startTotal: continuousTotal - inc, 
                            changes:[], 
                            lastDesc: null, 
                            isSnow: (p.temp !== undefined && p.temp !== null ? p.temp : 10) < 2,
                            lastTime: p.timestamp
                        };
                    }
                    
                    let desc = rate > 0 ? getPrecipIntensityDescription(rate, currentEvent.isSnow).toLowerCase() : (currentEvent.isSnow ? 'hószállingózás' : 'csepergés');
                    let accRain = continuousTotal - currentEvent.startTotal;
                    
                    currentEvent.changes.push({ time: p.timestamp, desc: desc, val: accRain });
                    currentEvent.lastDesc = desc;
                    currentEvent.lastTime = p.timestamp;
                    currentEvent.totalRain = accRain;
                } else {
                    if (currentEvent) {
                        currentEvent.end = currentEvent.lastTime;
                        events.push(currentEvent);
                        currentEvent = null;
                    }
                }
            }

            if (currentEvent) {
                events.push(currentEvent);
            }

            let todayStart = new Date();
            todayStart.setHours(0,0,0,0);
            let todayStartMs = todayStart.getTime();

            let displayEvents = events.filter(ev => {
                return ev.end >= todayStartMs || ev.end === null;
            });

            const station = STATIONS[activeDisplayStationKey];
            let displayDailyTotal = station && station.isOnline && station.data ? 
                station.data.metric.precipTotal : 
                (allStationPoints.length > 0 ? allStationPoints[allStationPoints.length-1].precipTotal : 0);

            if (displayEvents.length > 0) {
                rainCol.classList.remove('is-hidden');
            } else {
                rainCol.classList.add('is-hidden');
                return; 
            }

            let html = '';
            displayEvents.forEach(ev => {
                let startTimeStr = formatEventTime(ev.start);
                let endTimeStr = ev.end ? formatEventTime(ev.end) : "Folyamatban";
                
                let detailsHtml = '';
                let lastDay = new Date(ev.changes[0]?.time || ev.start).getDate();
                
                ev.changes.forEach(ch => {
                    let chDay = new Date(ch.time).getDate();
                    if (chDay !== lastDay) {
                        detailsHtml += `<div style="text-align:center; padding: 4px 0; margin: 4px 0; border-top: 1px dashed rgba(255,255,255,0.2); border-bottom: 1px dashed rgba(255,255,255,0.2); font-weight: bold; color: var(--precip-snow-color);">--- Napváltás / Éjfél ---</div>`;
                        lastDay = chDay;
                    }
                    detailsHtml += `
                        <div style="display:flex; justify-content:space-between; color: rgba(255,255,255,0.8); border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 3px;">
                            <span>${formatHourOnly(ch.time)} - ${ch.desc}</span>
                            <strong>${Number(ch.val).toFixed(1)} mm</strong>
                        </div>
                    `;
                });

                if (ev.end) {
                    html += `
                    <div class="rain-event-closed" onclick="this.classList.toggle('expanded')" style="background:rgba(0,0,0,0.25); border-radius:6px; border-left: 2px solid var(--precip-color); margin-bottom: 5px; cursor: pointer; overflow: hidden; transition: all 0.3s ease;">
                        <div style="display:flex; justify-content:space-between; padding:6px 8px; align-items: center; user-select: none;">
                            <span><i class="fas fa-chevron-down expand-icon" style="margin-right:6px; font-size:10px; transition: transform 0.3s; color: var(--current-accent);"></i>${startTimeStr} - ${endTimeStr}</span>
                            <strong>${Number(ev.totalRain).toFixed(1)} mm</strong>
                        </div>
                        <div class="rain-event-details scrollable-details" style="flex-direction:column; gap:4px; background:rgba(255,255,255,0.05); padding:6px 8px; font-size:10px; border-top: 1px solid rgba(255,255,255,0.05); max-height: 150px; overflow-y: auto;">
                            ${detailsHtml}
                        </div>
                    </div>`;
                } else {
                    html += `<div style="display:flex; flex-direction:column; gap:4px; background:rgba(56, 189, 248, 0.1); border: 1px solid rgba(56, 189, 248, 0.3); padding:6px 8px; border-radius:6px; margin-bottom: 5px;">`;
                    html += `
                        <div style="display:flex; justify-content:space-between; font-weight: bold; color: #fff; margin-bottom: 4px; font-size:12px;">
                            <span><i class="fas fa-cloud-showers-heavy"></i> Folyamatban (${startTimeStr} óta)</span>
                            <span style="color:var(--text-primary)">${Number(ev.totalRain).toFixed(1)} mm</span>
                        </div>
                    `;
                    html += `<div class="scrollable-details" style="max-height: 150px; overflow-y: auto; padding-right: 4px; display: flex; flex-direction: column; gap: 4px;">`;
                    html += detailsHtml;
                    html += `</div></div>`;
                }
            });

            logBox.innerHTML = html;
            totalBox.textContent = (displayDailyTotal || 0).toFixed(1) + ' mm';
            
            logBox.scrollTop = logBox.scrollHeight;
            
            const innerScrolls = logBox.querySelectorAll('.scrollable-details');
            if (innerScrolls.length > 0) {
                const lastInner = innerScrolls[innerScrolls.length - 1];
                lastInner.scrollTop = lastInner.scrollHeight;
            }
        }

        function calculateActualDailyStats(dataPoints) {
            if(!dataPoints || dataPoints.length === 0) return;
            
            const todayStr = new Date().toLocaleDateString("hu-HU");
            const todaysPoints = dataPoints.filter(p => {
                return new Date(p.timestamp).toLocaleDateString("hu-HU") === todayStr;
            });

            if (todaysPoints.length === 0) {
                updateTextValue('actual-max', '--'); updateTextValue('actual-max-time', '');
                updateTextValue('actual-min', '--'); updateTextValue('actual-min-time', '');
                updateTextValue('actual-range', '--');
                return;
            }

            let maxT = null, minT = null;

            todaysPoints.forEach(p => {
                if (p.temp !== null && p.temp !== undefined) {
                    if (maxT === null || p.temp > maxT.temp) maxT = p;
                    if (minT === null || p.temp < minT.temp) minT = p;
                }
            });

            if (maxT !== null) {
                updateTextValue('actual-max', formatValue(maxT.temp, '°', 1));
                updateTextValue('actual-max-time', `(${formatHourOnly(maxT.timestamp)})`);
            }
            if (minT !== null) {
                updateTextValue('actual-min', formatValue(minT.temp, '°', 1));
                updateTextValue('actual-min-time', `(${formatHourOnly(minT.timestamp)})`);
            }
            
            if (maxT !== null && minT !== null) {
                let range = maxT.temp - minT.temp;
                updateTextValue('actual-range', formatValue(range, '°C', 1));
            } else {
                updateTextValue('actual-range', '--');
            }
        }

        function resetToToday() {
            const datePicker = document.getElementById('history-date-picker');
            if (datePicker) {
                const tzOffset = (new Date()).getTimezoneOffset() * 60000;
                const localISOTime = (new Date(Date.now() - tzOffset)).toISOString().slice(0, -1);
                datePicker.value = localISOTime.split('T')[0];
                searchHistory();
            }
        }

        async function searchHistory() {
            const dateVal = document.getElementById('history-date-picker').value;
            if(!dateVal) return;
            
            const picker = document.getElementById('history-station-picker');
            let targetKey = picker ? picker.value : activeDisplayStationKey;
            if(!targetKey || !STATIONS[targetKey]) targetKey = activeDisplayStationKey;
            
            const targetId = STATIONS[targetKey].id;
            const isOnline = STATIONS[targetKey].isOnline;
            
            const dateParts = dateVal.split('-');
            const selectedDateObj = new Date(dateParts[0], parseInt(dateParts[1]) - 1, dateParts[2], 0, 0, 0);
            const selectedDateString = selectedDateObj.toLocaleDateString("hu-HU");
            const todayString = new Date().toLocaleDateString("hu-HU");

            const body = document.getElementById('history-table-body');
            const tableTimeEl = document.getElementById('table-update-time');
            if (tableTimeEl) tableTimeEl.textContent = `Frissítve: ${formatTime(new Date())}`;

            try {
                let allStationPoints =[];

                if (selectedDateString === todayString && windowGlobalHistoryCache && windowGlobalHistoryCache.length > 0) {
                    allStationPoints = getEnrichedHistory(targetKey);
                } else {
                    const snap = await firebase.database().ref('history').once('value'); 
                    const data = snap.val(); 
                    if(!data) {
                        body.innerHTML = '<tr><td colspan="7" style="text-align:center; padding: 20px;">Nincs elérhető adat az adatbázisban.</td></tr>';
                        return;
                    }
                    let tempPoints =[];
                    snap.forEach(child => { tempPoints.push(child.val()); });
                    
                    allStationPoints = tempPoints.filter(p => p.stationId === targetId || p.stationId === targetKey || p.stationInternalId === targetId);
                    allStationPoints.sort((a,b) => a.timestamp - b.timestamp);
                }
                
                let descendingPoints =[...allStationPoints].sort((a,b) => b.timestamp - a.timestamp);
                const lastPt = descendingPoints[0];

                const warningBox = document.getElementById('table-offline-warning');
                if (warningBox) {
                    if (!isOnline) {
                        if (lastPt) {
                            warningBox.innerHTML = `<i class="fas fa-exclamation-triangle"></i> <strong>A kiválasztott állomás épp offline!</strong> Jelenleg nem érkezik friss adat. Az utolsó ismert sikeres mérés ekkor történt: <strong>${formatLastSeen(lastPt.timestamp)}</strong>. Az alábbi napló csak az eddig mentett értékeket mutatja.`;
                        } else {
                            warningBox.innerHTML = `<i class="fas fa-exclamation-triangle"></i> <strong>A kiválasztott állomás épp offline!</strong> Jelenleg nem érkezik friss adat, és egyelőre nincs korábbi mérés sem a memóriában.`;
                        }
                        warningBox.classList.remove('is-hidden');
                    } else {
                        warningBox.classList.add('is-hidden');
                    }
                }

                const dailyPoints = descendingPoints.filter(p => {
                    const pDateString = new Date(p.timestamp).toLocaleDateString("hu-HU");
                    return (pDateString === selectedDateString) || (p.datum && p.datum.includes(selectedDateString));
                });

                let dayStartMs = selectedDateObj.getTime();
                let pointsBeforeDay = allStationPoints.filter(p => p.timestamp < dayStartMs).sort((a,b) => a.timestamp - b.timestamp);
                let prevRaw = pointsBeforeDay.length > 0 ? (pointsBeforeDay[pointsBeforeDay.length - 1].precipTotal || 0) : 0;
                
                let preciseDailyAcc = 0;
                let wasRainingForward = false;
                
                let chronologicalDaily =[...dailyPoints].sort((a,b) => a.timestamp - b.timestamp);
                
                chronologicalDaily.forEach(p => {
                    let raw = p.precipTotal || 0;
                    let diff = raw - prevRaw;
                    
                    if (diff > 0) {
                        preciseDailyAcc += diff;
                    } else if (diff < 0) {
                        preciseDailyAcc += raw;
                    }
                    
                    p.displayPrecip = preciseDailyAcc;
                    
                    let rate = p.precipRate || 0;
                    let isRainingForward = (rate > 0 || diff > 0);
                    
                    if (isRainingForward) {
                        p.rainState = 'raining';
                        wasRainingForward = true;
                    } else if (wasRainingForward) {
                        p.rainState = 'stopped';
                        wasRainingForward = false;
                    } else {
                        p.rainState = 'none';
                    }

                    prevRaw = raw;
                });

                const midDay = new Date(selectedDateObj.getTime());
                midDay.setHours(12,0,0,0);
                const sunTimesForDate = SunCalc.getTimes(midDay, STATIONS[targetKey].coords.lat, STATIONS[targetKey].coords.lon);
                const srTime = sunTimesForDate.sunrise.getTime();
                const ssTime = sunTimesForDate.sunset.getTime();

                let html = '';
                let sunriseInjected = false;
                let sunsetInjected = false;

                if (dailyPoints.length > 0) {
                    for (let i = 0; i < dailyPoints.length; i++) {
                        const p = dailyPoints[i];
                        const nextP = dailyPoints[i+1]; 
                        
                        const timeStr = new Date(p.timestamp).toLocaleTimeString('hu-HU', {hour: '2-digit', minute:'2-digit'});
                        
                        let precipValToShow = p.displayPrecip !== undefined ? p.displayPrecip : (p.precipTotal || 0);
                        let precipHtml = `<span style="${precipValToShow > 0 ? 'color: var(--precip-color); font-weight: bold;' : ''}">${precipValToShow.toFixed(1)} mm</span>`;
                        
                        if (p.rainState === 'raining') {
                            let isSnow = p.temp !== null && p.temp < 2;
                            let desc = p.precipRate > 0 ? getPrecipIntensityDescription(p.precipRate, isSnow) : (isSnow ? 'Hószállingózás' : 'Csepergés / Szitálás');
                            precipHtml += `<br><span style="font-size: 10px; color: var(--text-secondary); opacity: 0.9;">${desc}</span>`;
                        } else if (p.rainState === 'stopped') {
                            precipHtml += `<br><span style="font-size: 10px; color: #4ade80; font-weight: bold; opacity: 0.9;">Csapadék elállt</span>`;
                        }

                        html += `
                        <tr style="border-bottom: 1px solid rgba(255,255,255,0.05); transition: background 0.2s;">
                            <td style="padding: 10px 4px; white-space: nowrap;">${timeStr}</td>
                            <td style="padding: 10px 4px; font-weight:bold; color: #ffdd00; white-space: nowrap;">${p.temp != null ? p.temp.toFixed(1) + ' °C' : '--'}</td>
                            <td style="padding: 10px 4px; white-space: nowrap;">${p.humidity != null ? p.humidity + ' %' : '--'}</td>
                            <td style="padding: 10px 4px; color: #38bdf8; white-space: nowrap;">${p.windSpeed || 0} km/h</td>
                            <td style="padding: 10px 4px; white-space: nowrap;">${p.pressure != null ? p.pressure + ' hPa' : '--'}</td>
                            <td style="padding: 10px 4px; white-space: nowrap;">${p.uv != null ? p.uv : '--'}</td>
                            <td style="padding: 10px 4px;">${precipHtml}</td>
                        </tr>`;

                        if (nextP) {
                            if (!sunsetInjected && p.timestamp >= ssTime && nextP.timestamp < ssTime) {
                                html += `<tr class="sun-event-row row-sunset"><td colspan="7"><i class="fas fa-sunset"></i> Napnyugta (${formatHourOnly(sunTimesForDate.sunset)})</td></tr>`;
                                sunsetInjected = true;
                            }
                            if (!sunriseInjected && p.timestamp >= srTime && nextP.timestamp < srTime) {
                                html += `<tr class="sun-event-row row-sunrise"><td colspan="7"><i class="fas fa-sunrise"></i> Napkelte (${formatHourOnly(sunTimesForDate.sunrise)})</td></tr>`;
                                sunriseInjected = true;
                            }
                        }
                    }
                } else {
                    if (!isOnline && lastPt) {
                        html = `<tr><td colspan="7" style="text-align:center; padding: 20px; color: #fca5a5; background: rgba(239, 68, 68, 0.05);">Ezen a napon nem érkezett adat. Jelenleg a(z) ${STATIONS[targetKey].displayNameShort || STATIONS[targetKey].displayName} állomás <strong>OFFLINE</strong>.<br>Az utolsó ismert sikeres mérés (${formatLastSeen(lastPt.timestamp)}) adatai:</td></tr>`;
                        
                        const timeStr = new Date(lastPt.timestamp).toLocaleTimeString('hu-HU', {hour: '2-digit', minute:'2-digit'});
                        let precipValToShow = lastPt.displayPrecip !== undefined ? lastPt.displayPrecip : (lastPt.precipTotal || 0);
                        let precipHtml = `<span style="${precipValToShow > 0 ? 'color: var(--precip-color); font-weight: bold;' : ''}">${precipValToShow.toFixed(1)} mm</span>`;
                        
                        if (lastPt.rainState === 'raining') {
                            let isSnow = lastPt.temp !== null && lastPt.temp < 2;
                            let desc = lastPt.precipRate > 0 ? getPrecipIntensityDescription(lastPt.precipRate, isSnow) : (isSnow ? 'Hószállingózás' : 'Csepergés / Szitálás');
                            precipHtml += `<br><span style="font-size: 10px; color: var(--text-secondary); opacity: 0.9;">${desc}</span>`;
                        } else if (lastPt.rainState === 'stopped') {
                            precipHtml += `<br><span style="font-size: 10px; color: #4ade80; font-weight: bold; opacity: 0.9;">Csapadék elállt</span>`;
                        }

                        html += `
                        <tr style="border-bottom: 1px solid rgba(255,255,255,0.05); background: rgba(239, 68, 68, 0.15);">
                            <td style="padding: 10px 4px; white-space: nowrap;">${timeStr}</td>
                            <td style="padding: 10px 4px; font-weight:bold; color: #ffdd00; white-space: nowrap;">${lastPt.temp != null ? lastPt.temp.toFixed(1) + ' °C' : '--'}</td>
                            <td style="padding: 10px 4px; white-space: nowrap;">${lastPt.humidity != null ? lastPt.humidity + ' %' : '--'}</td>
                            <td style="padding: 10px 4px; color: #38bdf8; white-space: nowrap;">${lastPt.windSpeed || 0} km/h</td>
                            <td style="padding: 10px 4px; white-space: nowrap;">${lastPt.pressure != null ? lastPt.pressure + ' hPa' : '--'}</td>
                            <td style="padding: 10px 4px; white-space: nowrap;">${lastPt.uv != null ? lastPt.uv : '--'}</td>
                            <td style="padding: 10px 4px;">${precipHtml}</td>
                        </tr>`;
                    } else {
                        html = `<tr><td colspan="7" style="text-align:center; padding: 20px;">Ezen a napon nem találtam adatot a(z) ${STATIONS[targetKey].displayNameShort || STATIONS[targetKey].displayName} állomáson.</td></tr>`;
                    }
                }

                body.innerHTML = html;
            } catch (error) {
                console.error("Hiba a keresés közben:", error);
                body.innerHTML = '<tr><td colspan="7" style="text-align:center; padding: 20px; color: #ef4444;">Hiba történt a lekérdezés közben.</td></tr>';
            }
        }

        function updateTheme() {
            if (!cachedData.sunCalc) return;
            const now = new Date();
            const lat = STATIONS[activeDisplayStationKey].coords.lat;
            const lon = STATIONS[activeDisplayStationKey].coords.lon;
            const times = SunCalc.getTimes(now, lat, lon);
            
            let phase = "";
            if (now >= times.night) phase = "night"; 
            else if (now >= times.nauticalDusk) phase = "dusk"; 
            else if (now >= times.sunset) phase = "sunsetEnd"; 
            else if (now >= times.sunsetStart) phase = "sunset"; 
            else if (now >= times.goldenHour) phase = "goldenHour"; 
            else if (now >= times.solarNoon) phase = "afternoon"; 
            else if (now >= times.goldenHourEnd) phase = "morning"; 
            else if (now >= times.sunriseEnd) phase = "earlyMorning"; 
            else if (now >= times.sunrise) phase = "sunrise"; 
            else if (now >= times.nauticalDawn) phase = "dawn"; 
            else phase = "night"; 

            const root = document.documentElement;
            const themes = {
                night: { bg: "linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%)", glass: "rgba(15,23,42,0.45)", border: "rgba(255,255,255,0.1)", shadow: "0 8px 32px 0 rgba(0,0,0,0.5)", accent: "#38bdf8" },

        function drawCompassRose() {
            const compassRoseSvg = document.querySelector('.wind-compass-rose');
            if(!compassRoseSvg) return;
            const center = 50; const radius = 42;
            const directions = { 'É': 0, 'K': 90, 'D': 180, 'NY': 270 };
            for (let i = 0; i < 360; i += 15) {
                const isMajor = i % 45 === 0;
                const r1 = isMajor ? radius - 4 : radius - 2;
                const angle = (i - 90) * Math.PI / 180;
                const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
                line.setAttribute('x1', center + r1 * Math.cos(angle)); line.setAttribute('y1', center + r1 * Math.sin(angle));
                line.setAttribute('x2', center + radius * Math.cos(angle)); line.setAttribute('y2', center + radius * Math.sin(angle));
                line.setAttribute('class', `tick`);
                line.setAttribute('stroke-width', isMajor ? 1.5 : 1);
                compassRoseSvg.appendChild(line);
            }
            for (const dir in directions) {
                const angle = (directions[dir] - 90) * Math.PI / 180;
                const text = document.createElementNS("http://www.w3.org/2000/svg", "text");
                text.setAttribute('x', center + (radius - 12) * Math.cos(angle));
                text.setAttribute('y', center + (radius - 12) * Math.sin(angle) + 4);
                text.textContent = dir;
                compassRoseSvg.appendChild(text);
            }
        }

        async function handleStationChange(event) { 
            const key = event.target.value; 
            if (STATIONS[key].isOnline && key !== activeDisplayStationKey) { 
                activeDisplayStationKey = key; 
                forecastPage = 0;
                const st = STATIONS[activeDisplayStationKey]; 
                if (st && st.data) { cachedData.displayPws = { ...st.data.metric, ...st.data }; }
                
                try {
                    const newGen = await fetchGeneralConditionsData(st.coords.lat, st.coords.lon);
                    if (newGen) cachedData.generalConditions = newGen;
                    await fetchMetarData();
                    const newSun = await fetchAdvancedSunCalcData(st.coords.lat, st.coords.lon);
                    if (newSun) cachedData.sunCalc = newSun;
                } catch (e) {}

                await fetchAndDisplayForecastsForStation(key);
                compileAndRenderDisplayData(); 
                
                const hp = document.getElementById('history-station-picker');
                if (hp) {
                    hp.value = activeDisplayStationKey;
                    processChartStationHistory();
                    searchHistory();
                }
                processMainStationHistory();
                
            } else if (!STATIONS[key].isOnline) { 
                event.target.checked = false; 
                const prev = document.querySelector(`input[value="${activeDisplayStationKey}"]`); 
                if (prev) prev.checked = true; 
            } 
        }
